<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_SYNC v4.3</title>
    <style>
        :root { 
            --t-orange: #FF8C00; 
            --bg: #000000; 
            --card: #050505;
            --border: #FF8C00; 
            --success: #00FF00;
            --error: #FF0000;
            --text-main: #FFFFFF;
            --accent: #a855f7;
        }
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--t-orange) #000; } 
        body { background: var(--bg); color: var(--text-main); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 480px; border-right: 2px solid var(--border); display: flex; flex-direction: column; background: var(--bg); flex-shrink: 0; height: 100vh; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--border); background: #000; flex-shrink: 0; }
        
        /* RESIZABLE CONTAINERS */
        #pane-inputs { height: 350px; min-height: 100px; overflow-y: auto; padding: 15px; background: #050505; }
        #pane-manifest { flex: 1; overflow-y: auto; padding: 15px; background: #000; display: flex; flex-direction: column; }
        
        /* DRAG HANDLE */
        .resizer { height: 8px; background: #222; cursor: row-resize; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .resizer:hover { background: var(--t-orange); }

        .log-zone { height: 120px; background: #050505; overflow-y: auto; padding: 10px; font-size: 10px; border-top: 2px solid var(--accent); flex-shrink: 0; }

        .tab-header { border: 2px solid var(--border); color: var(--t-orange); padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; text-transform: uppercase; }
        .tab-content { display: none; padding: 5px; border: 1px solid var(--border); border-top: none; }
        .tab-content.open { display: block; }

        .input-row { display: grid; grid-template-columns: 1fr 50px 80px 40px; gap: 5px; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .input-row input { background: #000; border: 1px solid #444; color: #fff; padding: 5px; font-size: 11px; width: 100%; }
        .add-btn { background: var(--t-orange); border: none; font-weight: bold; cursor: pointer; height: 28px; }

        .manifest-list-container { flex: 1; overflow-y: auto; margin-top: 10px; }
        .manifest-entry { background: #0a0a0a; border: 1px solid #333; padding: 10px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto; border-left: 3px solid var(--t-orange); }
        .m-info b { color: var(--t-orange); font-size: 12px; display: block; }
        .m-info span { font-size: 10px; opacity: 0.8; }
        
        .entry-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-mini { background: transparent; font-size: 9px; cursor: pointer; padding: 4px; font-weight: bold; border: 1px solid; text-align: center; }
        .btn-move { color: #fff; border-color: #555; }
        .btn-wikelo { color: var(--t-orange); border-color: var(--t-orange); }
        .btn-del { color: var(--error); border-color: var(--error); grid-column: span 2; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 2px solid var(--border); background: #000; flex-shrink: 0; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 25px; }
        .card { background: var(--card); border: 2px solid var(--border); padding: 20px; position: relative; }
        .card.craftable { border-top: 8px solid var(--success); }
        .reward-label { color: var(--accent); font-size: 11px; font-weight: bold; text-transform: uppercase; margin: 5px 0; display: block; }
        .authority-box { font-size: 10px; margin-top: 8px; background: rgba(255,140,0,0.08); padding: 8px; border-left: 2px solid var(--t-orange); }
        .btn-handin { background: transparent; border: 2px solid var(--border); color: var(--t-orange); padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-handin:disabled { border-color: #333; color: #333; }
        
        @media (max-width: 1024px) { .sidebar { width: 100%; height: auto; } body { flex-direction: column; } .resizer { display: none; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="color:var(--t-orange); font-size:14px; margin:0 0 10px 0; letter-spacing: 2px;">[ LOGISTICS_SYNC_V4.3 ]</h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="squad-code" style="background:#000; border:1px solid #444; color:#fff; padding:8px; font-size:12px; width:50%;" placeholder="SQUAD_CODE..." onchange="saveConfig()">
            <input type="text" id="user-handle" style="background:#000; border:1px solid #444; color:#fff; padding:8px; font-size:12px; width:50%;" placeholder="HANDLE..." onchange="saveConfig()">
        </div>
    </div>

    <div id="pane-inputs"></div>

    <div class="resizer" id="drag-bar"></div>

    <div id="pane-manifest">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:5px; flex-shrink:0;">
            <h3 style="font-size:11px; color:var(--t-orange); margin:0;">[ SHARED_POOL ]</h3>
            <button onclick="resetAll()" style="background:transparent; border:1px solid var(--error); color:var(--error); font-size:9px; padding:2px 5px; cursor:pointer;">PURGE</button>
        </div>
        <div class="manifest-list-container" id="manifest-list"></div>
    </div>

    <div class="log-zone" id="transaction-logs">
        <h3 style="font-size:10px; color:var(--accent); margin:0 0 5px 0;">[ RECENT_TRANSACTIONS ]</h3>
    </div>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 18px; color: #fff;">MANIFEST // <span style="color:var(--t-orange);">0 READY</span></h1>
        <input type="text" id="manifest-search" style="background:#000; border:1px solid #444; color:#fff; padding:8px; font-size:12px; width:200px;" placeholder="SEARCH CONTRACTS..." oninput="updateDisplay()">
    </div>
    <div class="scroll-area"><div id="contract-grid" class="grid"></div></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWDSQJGrVLvUBlgt0WcVbOujruEzEAVTVOvI7XoCiyxmq_fS1WUZES4rwEXqcmgU7h/exec";
    const WIKELO_LOCS = ["DASI", "SELO", "KINGA"];
    
    let MATERIALS = [], CONTRACTS = [], LOCATIONS = {}, sharedManifest = [], tracked = [], filterMode = 'craftable';

    // RESIZER LOGIC
    const resizer = document.getElementById('drag-bar');
    const topPane = document.getElementById('pane-inputs');
    let isDragging = false;

    resizer.addEventListener('mousedown', (e) => { isDragging = true; document.body.style.cursor = 'row-resize'; });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const sidebarTop = document.querySelector('.sidebar-header').offsetHeight;
        const newHeight = e.clientY - sidebarTop;
        if (newHeight > 100 && newHeight < (window.innerHeight - 300)) {
            topPane.style.height = newHeight + 'px';
        }
    });
    document.addEventListener('mouseup', () => { isDragging = false; document.body.style.cursor = 'default'; });

    async function loadSystemData() {
        try {
            const dRes = await fetch('wikelo-data.json');
            const d = await dRes.json();
            const lRes = await fetch('locations.json');
            LOCATIONS = lRes.ok ? await lRes.json() : {};
            MATERIALS = d.materials || []; CONTRACTS = d.contracts || [];
            sharedManifest = JSON.parse(localStorage.getItem('wikelo-manifest-v2')) || [];
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            renderTabs(); updateDisplay();
            setInterval(syncWithCloud, 15000); syncWithCloud();
        } catch (e) { console.error(e); }
    }

    function renderTabs() {
        const container = document.getElementById('pane-inputs');
        container.innerHTML = '';
        const cats = { "currency": "Currency", "ores": "Ores", "creature": "Fauna", "medals": "Artifacts", "tech": "Tech", "weapons": "Weapons", "gear": "Gear" };
        Object.entries(cats).forEach(([key, label]) => {
            const mats = MATERIALS.filter(m => m.cat === key);
            if (mats.length === 0) return;
            const header = document.createElement('div');
            header.className = 'tab-header'; header.innerHTML = `<span>${label}</span>`;
            header.onclick = () => header.nextElementSibling.classList.toggle('open');
            const content = document.createElement('div');
            content.className = 'tab-content';
            mats.forEach(mat => {
                const row = document.createElement('div');
                row.className = 'input-row';
                row.innerHTML = `<span>${mat.name}</span><input type="number" id="qty-${mat.id}"><input type="text" id="loc-${mat.id}"><button class="add-btn" onclick="addToManifest('${mat.id}')">+</button>`;
                content.appendChild(row);
            });
            container.appendChild(header); container.appendChild(content);
        });
    }

    async function syncWithCloud(action = "sync", newLog = null) {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        try {
            const payload = { action, squadCode: squad.toUpperCase(), handle: handle.toUpperCase(), manifest: JSON.stringify(sharedManifest), newLog };
            const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            const data = await response.json();
            if (data.manifest) {
                sharedManifest = data.manifest;
                localStorage.setItem('wikelo-manifest-v2', JSON.stringify(sharedManifest));
                renderLogs(data.logs); updateDisplay();
            }
        } catch (e) { console.error(e); }
    }

    function renderLogs(logs) {
        const zone = document.getElementById('transaction-logs');
        const header = zone.querySelector('h3');
        zone.innerHTML = ''; zone.appendChild(header);
        if (!logs) return;
        logs.forEach(l => {
            const div = document.createElement('div'); div.className = 'log-entry';
            div.innerHTML = `<i>${new Date(l.time).toLocaleTimeString()}</i> <b>${l.user}</b>: ${l.contract} @ ${l.source}`;
            zone.appendChild(div);
        });
    }

    function addToManifest(id) {
        const qI = document.getElementById(`qty-${id}`), lI = document.getElementById(`loc-${id}`);
        if (!parseInt(qI.value)) return;
        sharedManifest.unshift({ uid: Date.now(), id: id, qty: parseInt(qI.value), loc: (lI.value || "STASH").toUpperCase(), user: (document.getElementById('user-handle').value || "ANON").toUpperCase() });
        qI.value = ''; lI.value = ''; syncWithCloud();
    }

    function moveEntry(uid) {
        const item = sharedManifest.find(e => e.uid === uid); if (!item) return;
        const newLoc = prompt("NEW LOCATION:", item.loc); if (!newLoc) return;
        item.loc = newLoc.toUpperCase(); item.user = document.getElementById('user-handle').value.toUpperCase(); syncWithCloud();
    }

    function dispatchToWikelo(uid) {
        const item = sharedManifest.find(e => e.uid === uid); if (!item) return;
        const choice = prompt(`DISPATCH ${item.id.toUpperCase()} TO:\n${WIKELO_LOCS.join(", ")}`, WIKELO_LOCS[0]);
        if (!choice) return;
        const selected = choice.toUpperCase();
        if (!WIKELO_LOCS.includes(selected)) return alert("INVALID WIKELO LOCATION.");
        item.loc = selected; item.user = (document.getElementById('user-handle').value || "ANON").toUpperCase(); syncWithCloud();
    }

    function handleHandIn(contractId) {
        const contract = CONTRACTS.find(c => c.id === contractId);
        const availableLocs = WIKELO_LOCS.filter(loc => contract.ingredients.some(ing => sharedManifest.some(e => e.id === ing.id && e.loc === loc)));
        if (!availableLocs.length) return alert("NO STOCK AT WIKELO LOCATIONS.");
        const selectedLoc = prompt(`SOURCE: ${availableLocs.join(", ")}`, availableLocs[0]).toUpperCase();
        if (!WIKELO_LOCS.includes(selectedLoc)) return;

        contract.ingredients.forEach(ing => {
            let needed = ing.qty;
            sharedManifest.filter(e => e.id === ing.id && e.loc === selectedLoc).forEach(stack => {
                if (needed <= 0) return;
                let take = Math.min(stack.qty, needed);
                stack.qty -= take; needed -= take; stack.user = document.getElementById('user-handle').value.toUpperCase();
            });
        });
        sharedManifest = sharedManifest.filter(e => e.qty > 0);
        syncWithCloud("sync", { contract: contract.name, reward: contract.reward, source: selectedLoc });
    }

    function updateDisplay() {
        const list = document.getElementById('manifest-list');
        list.innerHTML = '';
        sharedManifest.forEach(e => {
            const mat = MATERIALS.find(m => m.id === e.id);
            const div = document.createElement('div'); div.className = 'manifest-entry';
            div.innerHTML = `
                <div class="m-info">
                    <b>${mat?mat.name:e.id} (x${e.qty})</b>
                    <span>${e.loc} | ${e.user}</span>
                </div>
                <div class="entry-controls">
                    <button class="btn-mini btn-move" onclick="moveEntry(${e.uid})">MOV</button>
                    <button class="btn-mini btn-wikelo" onclick="dispatchToWikelo(${e.uid})">WKL</button>
                    <button class="btn-mini btn-del" onclick="removeEntry(${e.uid})">DEL</button>
                </div>`;
            list.appendChild(div);
        });

        const grid = document.getElementById('contract-grid'), search = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        const totals = sharedManifest.reduce((acc, curr) => { acc[curr.id] = (acc[curr.id]||0) + curr.qty; return acc; }, {});
        let readyCount = 0;

        CONTRACTS.forEach(c => {
            if (!c.name.toLowerCase().includes(search) && !c.reward.toLowerCase().includes(search)) return;
            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const stock = totals[ing.id] || 0; if (stock < ing.qty) canCraft = false;
                const contributors = sharedManifest.filter(e => e.id === ing.id);
                return `<li><b style="color:${stock>=ing.qty?'var(--success)':'inherit'}">${stock}/${ing.qty} ${MATERIALS.find(m=>m.id===ing.id)?.name || ing.id}</b><div class="authority-box">${contributors.map(e=>`<div>[${e.qty}] @ ${e.loc} - ${e.user}</div>`).join('')}</div></li>`;
            }).join('');
            if (canCraft) readyCount++;
            const card = document.createElement('div'); card.className = `card ${canCraft?'craftable':''}`;
            card.innerHTML = `<b style="font-size:16px;">${c.name}</b><small class="reward-label">${c.reward}</small><ul class="ingred-list">${ingreds}</ul><button class="btn-handin" onclick="handleHandIn('${c.id}')" ${!canCraft?'disabled' : ''}>INITIALIZE_HAND_IN</button>`;
            grid.appendChild(card);
        });
        document.getElementById('stats-header').innerHTML = `MANIFEST // <span style="color:var(--t-orange);">${readyCount} READY</span>`;
    }

    function removeEntry(uid) { sharedManifest = sharedManifest.filter(e => e.uid !== uid); syncWithCloud(); }
    function setFilter(f) { filterMode = f; updateDisplay(); }
    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); syncWithCloud(); }
    function resetAll() { if(confirm("PURGE ALL DATA?")) { sharedManifest = []; syncWithCloud("purge"); } }
    window.onload = loadSystemData;
</script>
</body>
</html>
