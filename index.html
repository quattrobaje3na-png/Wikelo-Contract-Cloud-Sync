<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_SQUAD_REP v2.8.2</title>
    <style>
        :root { 
            --t-orange: #FF8C00; 
            --bg: #000000; 
            --card: #050505;
            --border: #FF8C00; 
            --success: #00FF00;
            --error: #FF0000;
            --text-main: #FFFFFF;
            --text-dim: #BBBBBB;
            --locked: #331a00;
        }
        
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--t-orange) #000; } 
        body { background: var(--bg); color: var(--text-main); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 480px; border-right: 2px solid var(--border); display: flex; flex-direction: column; background: var(--bg); flex-shrink: 0; height: 100vh; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--border); background: #000; }

        .rep-display { background: #111; border: 1px solid var(--t-orange); padding: 15px; margin-bottom: 15px; text-align: center; }
        .rep-val { font-size: 24px; color: var(--t-orange); text-shadow: 0 0 10px var(--t-orange); font-weight: bold; }

        .sync-panel { background: #111; padding: 15px; border: 1px solid var(--t-orange); margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        .sync-panel input { width: 100%; background: #000; border: 1px solid var(--t-orange); color: var(--t-orange); padding: 10px; font-family: monospace; font-size: 11px; text-transform: uppercase; box-sizing: border-box; outline: none; }

        .sidebar-split { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-scroll-top { height: 50%; overflow-y: auto; padding: 15px; border-bottom: 2px solid var(--border); background: #050505; }
        .manifest-zone { height: 50%; background: #000; overflow-y: auto; padding: 15px; }

        /* --- TABS & INPUTS --- */
        .tab-header { border: 2px solid var(--border); color: var(--t-orange); padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; text-transform: uppercase; background: #000; font-weight: bold; }
        .tab-content { display: none; padding: 5px; border: 2px solid var(--border); border-top: none; background: #050505; }
        .tab-content.open { display: block; }
        .input-row { display: grid; grid-template-columns: 1fr 50px 80px 45px; gap: 8px; align-items: center; padding: 10px 6px; border-bottom: 1px solid #222; }
        .input-row input { background: #000; border: 1px solid #666; color: #fff; padding: 8px; font-size: 12px; width: 100%; outline: none; }
        .add-btn { background: var(--t-orange); color: #000; border: none; font-weight: bold; cursor: pointer; height: 32px; font-size: 16px; }

        /* --- MODAL --- */
        #rep-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: #050505; border: 2px solid var(--t-orange); width: 400px; margin: 10% auto; padding: 25px; text-align: center; }
        .user-option { display: flex; align-items: center; justify-content: space-between; padding: 12px; border: 1px solid #333; margin: 8px 0; cursor: pointer; color: #fff; }
        .user-option.selected { border-color: var(--success); background: rgba(0,255,0,0.1); color: var(--success); }

        /* --- MANIFEST --- */
        .manifest-entry { background: #0a0a0a; border: 1px solid #444; padding: 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; align-items: center; }
        .m-info b { color: var(--t-orange); font-size: 13px; display: block; }
        .m-info span { font-size: 11px; color: #fff; font-style: italic; }
        .del-mini { color: var(--error); border: 2px solid var(--error); background: transparent; font-size: 11px; cursor: pointer; padding: 6px 10px; font-weight: bold; }

        /* --- MAIN GRID --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 2px solid var(--border); background: #000; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 30px; }
        
        .card { background: var(--card); border: 2px solid var(--border); padding: 25px; position: relative; display: flex; flex-direction: column; }
        .card.locked { opacity: 0.5; border-color: #442200; background: var(--locked); }
        .card.craftable { border-top: 10px solid var(--success); }
        
        .rep-req-badge { position: absolute; top: -15px; right: 10px; background: var(--error); color: #fff; padding: 4px 10px; font-size: 10px; font-weight: bold; border: 1px solid #fff; }
        .reward-label { color: #a855f7; font-size: 12px; font-weight: bold; text-transform: uppercase; margin: 6px 0; }
        
        .ingred-list { font-size: 14px; list-style: none; padding: 0; margin: 15px 0; }
        .ingred-list > li { margin-bottom: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .authority-box { font-size: 11px; margin-top: 8px; background: rgba(255,140,0,0.1); padding: 8px; border-left: 3px solid var(--t-orange); }

        .btn { background: transparent; border: 2px solid var(--border); color: var(--t-orange); padding: 12px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: auto; }
        .btn:hover:not(:disabled) { background: var(--t-orange); color: #000; }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        .lamp { width: 8px; height: 8px; border-radius: 50%; background: #222; display: inline-block; margin-right: 8px; }
        .lamp.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
    </style>
</head>
<body>

<div id="rep-modal">
    <div class="modal-content">
        <h3 style="color:var(--t-orange); margin:0 0 10px 0;">AWARD_FULL_REP</h3>
        <p style="font-size:10px; color:#888; margin-bottom:20px;">Every selected user receives the full contract REP.</p>
        <div id="squad-selector-list"></div>
        <button class="btn" style="border-color:var(--success); color:var(--success); width:100%; margin-top:15px;" onclick="finalizeHandIn()">[ EXECUTE_DISTRIBUTION ]</button>
        <button class="btn" style="border-color:#444; color:#444; width:100%; margin-top:8px;" onclick="closeModal()">CANCEL</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="rep-display">
            <div style="font-size: 9px; letter-spacing: 2px; color: #888; margin-bottom:5px;">PERSONAL_REPUTATION</div>
            <div id="total-rep" class="rep-val">0</div>
        </div>
        <div class="sync-panel">
            <input type="text" id="squad-code" placeholder="SQUAD_CODE..." onchange="saveConfig()">
            <input type="text" id="user-handle" placeholder="HANDLE..." onchange="saveConfig()">
            <div style="margin-top:5px; font-size:10px; color:var(--t-orange);">
                <div id="sync-lamp" class="lamp"></div>SYNC_STATUS: ACTIVE
            </div>
        </div>
    </div>

    <div class="sidebar-split">
        <div class="sidebar-scroll-top" id="inventory-tabs"></div>
        <div class="manifest-zone" id="manifest-list">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="font-size:12px; color:var(--t-orange); margin:0;">[ ACTIVE_MANIFEST ]</h3>
                <button onclick="resetAll()" style="background:transparent; border:1px solid var(--error); color:var(--error); font-size:9px; padding:4px 8px;">PURGE</button>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 18px; color: #fff;">MANIFEST // <span style="color:var(--t-orange);">0 READY</span></h1>
        <div style="display:flex; align-items:center; gap:10px;">
            <input type="text" id="manifest-search" style="background:#000; border:1px solid #444; color:#fff; padding:8px; font-size:12px; width:200px;" placeholder="FILTER..." oninput="updateDisplay()">
            <div class="filter-group" style="display:flex; gap:5px;">
                <button class="btn active" id="f-craft" onclick="setFilter('craftable')">READY</button>
                <button class="btn" id="f-all" onclick="setFilter('all')">ALL</button>
            </div>
        </div>
    </div>
    <div class="scroll-area">
        <div id="contract-grid" class="grid"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywgKsYfx5yZP2cgLDlfsKia5hEcbS5LrJ6v4SQtdzRF4CyBGPYtfz_gnTiNbO3gaCxUA/exec";
    
    let MATERIALS = [], CONTRACTS = [], manifest = [], tracked = [], squadMembers = [];
    let filterMode = 'craftable';
    let totalREP = parseInt(localStorage.getItem('wikelo-rep')) || 0;
    let activeContractId = null;
    let selectedParticipants = new Set();

    async function loadSystemData() {
        try {
            const res = await fetch('wikelo-data.json');
            const d = await res.json();
            MATERIALS = d.materials;
            CONTRACTS = d.contracts;
            manifest = JSON.parse(localStorage.getItem('wikelo-manifest-v2')) || [];
            tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
            
            document.getElementById('total-rep').innerText = totalREP;
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            
            renderTabs();
            renderManifest();
            updateDisplay();
            setInterval(syncWithCloud, 15000);
            syncWithCloud();
        } catch (e) { console.error("INIT_FAIL", e); }
    }

    function renderTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        const cats = { "currency": "Currency", "ores": "Ores", "creature": "Fauna", "medals": "Artifacts", "tech": "Tech", "weapons": "Weapons", "gear": "Gear" };
        Object.entries(cats).forEach(([key, label]) => {
            const mats = MATERIALS.filter(m => m.cat === key);
            if (!mats.length) return;
            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>+</span>`;
            header.onclick = () => {
                const c = header.nextElementSibling;
                c.classList.toggle('open');
                header.querySelector('span:last-child').innerText = c.classList.contains('open') ? '-' : '+';
            };
            const content = document.createElement('div');
            content.className = 'tab-content';
            mats.forEach(mat => {
                const div = document.createElement('div');
                div.className = 'input-row';
                div.innerHTML = `<span>${mat.name}</span><input type="number" id="qty-${mat.id}" placeholder="0"><input type="text" id="loc-${mat.id}" placeholder="LOC"><button class="add-btn" onclick="addToManifest('${mat.id}')">+</button>`;
                content.appendChild(div);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function addToManifest(id) {
        const q = document.getElementById(`qty-${id}`), l = document.getElementById(`loc-${id}`);
        const val = parseInt(q.value); if (!val || val <= 0) return;
        manifest.unshift({ uid: Date.now(), id: id, qty: val, loc: (l.value || "STATION").toUpperCase(), user: (document.getElementById('user-handle').value || "ANON").toUpperCase() });
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(manifest));
        q.value = ''; l.value = ''; renderManifest(); updateDisplay(); syncWithCloud();
    }

    function renderManifest() {
        const list = document.getElementById('manifest-list');
        const header = list.querySelector('div');
        list.innerHTML = ''; list.appendChild(header);
        manifest.forEach(e => {
            const mat = MATERIALS.find(m => m.id === e.id);
            const div = document.createElement('div');
            div.className = 'manifest-entry';
            div.innerHTML = `<div class="m-info"><b>${mat ? mat.name : e.id} (x${e.qty})</b><span>LOC: ${e.loc} | AUTH: ${e.user}</span></div><button class="del-mini" onclick="removeEntry(${e.uid})">X</button>`;
            list.appendChild(div);
        });
    }

    function removeEntry(uid) {
        manifest = manifest.filter(e => e.uid !== uid);
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(manifest));
        renderManifest(); updateDisplay(); syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value, handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        try {
            const payload = { action: "sync", squadCode: squad, handle: handle, manifest: JSON.stringify(manifest), rep: totalREP };
            const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === "success") {
                const lamp = document.getElementById('sync-lamp'); lamp.classList.add('active');
                if (result.squadUpdates) squadMembers = result.squadUpdates.map(u => u.handle);
                setTimeout(() => lamp.classList.remove('active'), 1500);
            }
        } catch (e) { console.error("SYNC_FAIL"); }
    }

    function openRepModal(contractId) {
        activeContractId = contractId;
        selectedParticipants.clear();
        const list = document.getElementById('squad-selector-list');
        list.innerHTML = '';
        const myHandle = (document.getElementById('user-handle').value || "ANON").toUpperCase();
        const members = Array.from(new Set([myHandle, ...squadMembers]));
        members.forEach(m => {
            const div = document.createElement('div'); div.className = 'user-option'; div.innerHTML = `<span>${m}</span><b class="box">[_]</b>`;
            div.onclick = () => {
                if(selectedParticipants.has(m)) { selectedParticipants.delete(m); div.classList.remove('selected'); div.querySelector('.box').innerText = '[_]'; }
                else { selectedParticipants.add(m); div.classList.add('selected'); div.querySelector('.box').innerText = '[X]'; }
            };
            list.appendChild(div);
        });
        document.getElementById('rep-modal').style.display = 'block';
    }

    function finalizeHandIn() {
        if (!selectedParticipants.size) return;
        const c = CONTRACTS.find(x => x.id === activeContractId);
        const myHandle = (document.getElementById('user-handle').value || "ANON").toUpperCase();

        // Material Deduction matched to new JSON keys
        c.ingredients.forEach(ing => {
            let needed = ing.quantity;
            for(let i = manifest.length - 1; i >= 0 && needed > 0; i--) {
                if(manifest[i].id === ing.materialId) {
                    const take = Math.min(manifest[i].qty, needed);
                    manifest[i].qty -= take; needed -= take;
                }
            }
        });
        manifest = manifest.filter(e => e.qty > 0);

        if (selectedParticipants.has(myHandle)) {
            totalREP += (c.reputationReward || 0);
            document.getElementById('total-rep').innerText = totalREP;
            localStorage.setItem('wikelo-rep', totalREP);
        }

        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(manifest));
        closeModal(); renderManifest(); updateDisplay(); syncWithCloud();
    }

    function closeModal() { document.getElementById('rep-modal').style.display = 'none'; }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        const term = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        const totals = manifest.reduce((acc, curr) => { acc[curr.id] = (acc[curr.id] || 0) + curr.qty; return acc; }, {});
        let readyCount = 0;

        CONTRACTS.forEach(c => {
            const isPinned = tracked.includes(c.id);
            const repLocked = (c.reputationRequired && totalREP < c.reputationRequired);
            if (!c.name.toLowerCase().includes(term) && !c.reward.toLowerCase().includes(term)) return;

            let canCraft = true;
            // Ingredients rendering matched to new JSON keys
            const ingreds = c.ingredients.map(ing => {
                const stock = totals[ing.materialId] || 0;
                if (stock < ing.quantity) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.materialId);
                const squadEntries = manifest.filter(e => e.id === ing.materialId);
                const authHTML = squadEntries.length ? `<div class="authority-box">` + squadEntries.map(e => `<div style="display:flex; justify-content:space-between;"><span>${e.qty} @ ${e.loc}</span><b>${e.user}</b></div>`).join('') + `</div>` : '';
                return `<li class="${stock >= ing.quantity ? 'status-ready' : 'status-missing'}"><b>${stock}/${ing.quantity} ${mat ? mat.name : ing.materialId}</b>${authHTML}</li>`;
            }).join('');

            if (canCraft && !repLocked) readyCount++;

            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft && !repLocked) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft && !repLocked ? 'craftable' : ''} ${repLocked ? 'locked' : ''}`;
                card.innerHTML = `
                    ${repLocked ? `<div class="rep-req-badge">REQ: ${c.reputationRequired} REP</div>` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:9px; color:#888;">${c.category.toUpperCase()}</span>
                    </div>
                    <b style="font-size:16px;">${c.name}</b>
                    <small class="reward-label">${c.reward} (+${c.reputationReward || 0} REP)</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" ${(!canCraft || repLocked) ? 'disabled' : ''} onclick="openRepModal('${c.id}')">
                        ${repLocked ? 'LOCKED_BY_REPUTATION' : canCraft ? 'INITIALIZE_HAND_IN' : 'INSUFFICIENT_STOCK'}
                    </button>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerHTML = `MANIFEST // <span style="color:var(--t-orange);">${readyCount} READY</span>`;
    }

    function setFilter(f) { filterMode = f; document.querySelectorAll('.filter-group .btn').forEach(b => b.classList.remove('active')); document.getElementById('f-' + (f === 'craftable' ? 'craft' : 'all')).classList.add('active'); updateDisplay(); }
    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); syncWithCloud(); }
    function resetAll() { if(confirm("PURGE?")) { manifest = []; localStorage.setItem('wikelo-manifest-v2', "[]"); renderManifest(); updateDisplay(); syncWithCloud(); } }
    window.onload = loadSystemData;
</script>
</body>
</html>
