<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_SYNC v2.5.0</title>
    <style>
        :root { 
            --t-orange: #FF8C00; 
            --bg: #000000; 
            --card: #050505;
            --border: #FF8C00; 
            --success: #00FF00;
            --error: #FF0000;
            --text-main: #FFFFFF;
            --text-dim: #777;
        }
        
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--t-orange) #000; } 
        body { background: var(--bg); color: var(--text-main); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 480px; 
            border-right: 2px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg); 
            flex-shrink: 0; 
            height: 100vh;
        }

        .sidebar-header { 
            padding: 20px; 
            border-bottom: 2px solid var(--border); 
            background: #000;
        }

        .sidebar-split {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-scroll-top { 
            height: 50%; 
            overflow-y: auto; 
            padding: 15px; 
            border-bottom: 2px solid var(--border); 
            background: #050505;
        }

        .manifest-zone { 
            height: 50%; 
            background: #000; 
            overflow-y: auto; 
            padding: 15px; 
        }

        /* --- TABS & INPUTS --- */
        .tab-header { border: 1px solid var(--border); color: var(--t-orange); padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; text-transform: uppercase; background: #000; font-weight: bold; letter-spacing: 1px; }
        .tab-content { display: none; padding: 5px; border: 1px solid var(--border); border-top: none; background: #050505; }
        .tab-content.open { display: block; }

        .input-row { display: grid; grid-template-columns: 1fr 50px 80px 45px; gap: 8px; align-items: center; padding: 12px 6px; border-bottom: 1px solid #222; }
        .input-row span { font-size: 11px; color: #fff; font-weight: bold; }
        .input-row input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; font-size: 12px; width: 100%; outline: none; }
        .input-row input:focus { border-color: var(--t-orange); }
        .add-btn { background: var(--t-orange); color: #000; border: none; font-weight: bold; cursor: pointer; height: 32px; font-size: 16px; transition: 0.1s; }
        .add-btn:hover { background: #fff; }

        /* --- MANIFEST LIST --- */
        .manifest-entry { background: #0a0a0a; border: 1px solid #333; padding: 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; align-items: center; }
        .m-info b { color: var(--t-orange); font-size: 12px; display: block; }
        .m-info span { font-size: 10px; color: #666; font-style: italic; }
        .del-mini { color: var(--error); border: 1px solid var(--error); background: transparent; font-size: 10px; cursor: pointer; padding: 6px 10px; }
        .del-mini:hover { background: var(--error); color: #000; }

        /* --- MAIN CONTENT HEADER --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 30px; 
            border-bottom: 2px solid var(--border); 
            background: #000; 
        }

        .search-wrap { display: flex; align-items: center; gap: 10px; }
        .search-input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; font-size: 11px; width: 180px; outline: none; }
        .search-input:focus { border-color: var(--t-orange); }

        .filter-group { display: flex; gap: 10px; }

        /* --- GRID & CARDS --- */
        .scroll-area { flex: 1; overflow-y: auto; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 30px; }

        .card { background: var(--card); border: 2px solid var(--border); padding: 25px; position: relative; }
        .card.craftable { border-top: 8px solid var(--success); }
        .card:hover { border-color: #fff; }

        .reward-label { color: #a855f7; font-size: 11px; font-weight: bold; text-transform: uppercase; margin: 4px 0; display: block; letter-spacing: 1px; }
        
        .ingred-list { font-size: 13px; list-style: none; padding: 0; margin: 15px 0; }
        .ingred-list > li { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 12px; }

        .authority-box { font-size: 10px; margin-top: 8px; background: rgba(255,140,0,0.08); padding: 8px; border-left: 2px solid var(--t-orange); }
        .auth-line { display: flex; justify-content: space-between; margin-bottom: 4px; color: #bbb; }
        .auth-line b { color: var(--t-orange); }

        .btn { background: transparent; border: 1px solid var(--border); color: var(--t-orange); padding: 10px 20px; cursor: pointer; font-size: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .btn:hover { background: var(--t-orange); color: #000; }
        .btn.active { background: var(--t-orange); color: #000; }

        @media (max-width: 1024px) {
            .sidebar { width: 100%; height: auto; border-right: none; }
            body { flex-direction: column; overflow-y: auto; }
            .sidebar-split { height: 900px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="color:var(--t-orange); font-size:14px; margin:0 0 12px 0; letter-spacing: 3px;">[ LOGISTICS_SYNC_V2.5 ]</h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="squad-code" style="background:#000; border:1px solid #444; color:#fff; padding:10px; font-size:12px; width:50%;" placeholder="SQUAD_CODE..." onchange="saveConfig()">
            <input type="text" id="user-handle" style="background:#000; border:1px solid #444; color:#fff; padding:10px; font-size:12px; width:50%;" placeholder="HANDLE..." onchange="saveConfig()">
        </div>
    </div>

    <div class="sidebar-split">
        <div class="sidebar-scroll-top" id="inventory-tabs"></div>
        <div class="manifest-zone" id="manifest-list">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #222; padding-bottom:10px;">
                <h3 style="font-size:12px; color:var(--t-orange); margin:0; letter-spacing: 1px;">[ ACTIVE_MANIFEST ]</h3>
                <button onclick="resetAll()" style="background:transparent; border:1px solid var(--error); color:var(--error); font-size:9px; padding:4px 8px; cursor:pointer;">PURGE_MANIFEST</button>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 18px; letter-spacing: 2px; color: #fff;">MANIFEST // <span style="color:var(--t-orange);">0 READY</span></h1>
        
        <div class="search-wrap">
            <input type="text" id="manifest-search" class="search-input" placeholder="SEARCH..." oninput="updateDisplay()">
            <div class="filter-group">
                <button class="btn" id="f-all" onclick="setFilter('all')">ALL</button>
                <button class="btn active" id="f-craft" onclick="setFilter('craftable')">READY</button>
                <button class="btn" id="f-track" onclick="setFilter('tracked')">PINNED</button>
            </div>
        </div>
    </div>
    <div class="scroll-area">
        <div id="contract-grid" class="grid"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIb6Ptkl9cSbwpwg79jnfXaFWVrcYu4FJB6P6hD1lMrZi_y2Zyp58WM5VxQchktMle5A/exec";
    
    let MATERIALS = [];
    let CONTRACTS = [];
    let LOCATIONS = {};
    let manifest = []; 
    let tracked = [];
    let filterMode = 'craftable';

    async function loadSystemData() {
        try {
            const dRes = await fetch('wikelo-data.json');
            const d = await dRes.json();
            const lRes = await fetch('locations.json');
            LOCATIONS = lRes.ok ? await lRes.json() : {};

            MATERIALS = d.materials || [];
            CONTRACTS = d.contracts || [];
            manifest = JSON.parse(localStorage.getItem('wikelo-manifest-v2')) || [];
            tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
            
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            
            renderTabs();
            renderManifest();
            updateDisplay();
        } catch (e) { console.error(e); }
    }

    function renderTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        const cats = { "currency": "Currency", "ores": "Ores", "creature": "Fauna", "medals": "Artifacts", "tech": "Tech", "weapons": "Weapons", "gear": "Gear" };
        
        Object.entries(cats).forEach(([key, label]) => {
            const mats = MATERIALS.filter(m => m.cat === key);
            if (mats.length === 0) return;

            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>+</span>`;
            header.onclick = () => {
                const c = header.nextElementSibling;
                c.classList.toggle('open');
                header.querySelector('span:last-child').innerText = c.classList.contains('open') ? '-' : '+';
            };

            const content = document.createElement('div');
            content.className = 'tab-content';
            mats.forEach(mat => {
                const row = document.createElement('div');
                row.className = 'input-row';
                row.innerHTML = `<span>${mat.name}</span><input type="number" id="qty-${mat.id}" placeholder="QTY"><input type="text" id="loc-${mat.id}" placeholder="LOC"><button class="add-btn" onclick="addToManifest('${mat.id}')">+</button>`;
                content.appendChild(row);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function addToManifest(id) {
        const qI = document.getElementById(`qty-${id}`);
        const lI = document.getElementById(`loc-${id}`);
        const qty = parseInt(qI.value);
        if (!qty || qty <= 0) return;

        manifest.unshift({
            uid: Date.now(),
            id: id,
            qty: qty,
            loc: (lI.value || "NOT_SPECIFIED").toUpperCase(),
            user: (document.getElementById('user-handle').value || "ANON").toUpperCase()
        });
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(manifest));
        qI.value = ''; lI.value = '';
        renderManifest(); updateDisplay();
    }

    function renderManifest() {
        const list = document.getElementById('manifest-list');
        const header = list.querySelector('div');
        list.innerHTML = ''; list.appendChild(header);
        manifest.forEach(e => {
            const mat = MATERIALS.find(m => m.id === e.id);
            const div = document.createElement('div');
            div.className = 'manifest-entry';
            div.innerHTML = `<div class="m-info"><b>${mat ? mat.name : e.id} (x${e.qty})</b><span>LOC: ${e.loc} | AUTH: ${e.user}</span></div><button class="del-mini" onclick="removeEntry(${e.uid})">X</button>`;
            list.appendChild(div);
        });
    }

    function removeEntry(uid) {
        manifest = manifest.filter(e => e.uid !== uid);
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(manifest));
        renderManifest(); updateDisplay();
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        const searchTerm = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        
        const totals = manifest.reduce((acc, curr) => {
            acc[curr.id] = (acc[curr.id] || 0) + curr.qty;
            return acc;
        }, {});

        let readyCount = 0;
        CONTRACTS.forEach(c => {
            const isPinned = tracked.includes(c.id);
            if (!c.name.toLowerCase().includes(searchTerm) && !c.reward.toLowerCase().includes(searchTerm)) return;

            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const stock = totals[ing.id] || 0;
                if (stock < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                const locStr = LOCATIONS[ing.id] || "DATA_UNAVAILABLE";
                
                const squadEntries = manifest.filter(e => e.id === ing.id);
                const authorityHTML = squadEntries.length > 0 ? 
                    `<div class="authority-box">` + 
                    squadEntries.map(e => `<div class="auth-line"><span>[${e.qty}] @ ${e.loc}</span><b>${e.user}</b></div>`).join('') + 
                    `</div>` : '';

                return `<li class="${stock >= ing.qty ? 'status-ready' : 'status-missing'}">
                    <div style="display:flex; justify-content:space-between;"><b>${stock}/${ing.qty} ${mat ? mat.name : ing.id}</b><span style="font-size:9px; color:#555;">WHERE: ${locStr}</span></div>
                    ${authorityHTML}
                </li>`;
            }).join('');

            if (canCraft) readyCount++;
            
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft ? 'craftable' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:10px;">
                        <span style="font-size:9px; color:#777; text-transform:uppercase;">${c.cat}</span>
                        <button class="btn" style="padding:2px 8px; font-size:12px; border:none; color:${isPinned ? 'var(--t-orange)' : '#333'}" onclick="toggleTrack('${c.id}')">★</button>
                    </div>
                    <b>${c.name}</b>
                    <small class="reward-label">${c.reward}</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" style="width:100%" ${!canCraft ? 'disabled' : ''}>${canCraft ? 'INITIALIZE_HAND_IN' : 'RESOURCES_INSUFFICIENT'}</button>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerHTML = `MANIFEST // <span style="color:var(--t-orange);">${readyCount} READY</span>`;
    }

    function toggleTrack(id) {
        const idx = tracked.indexOf(id);
        if(idx > -1) tracked.splice(idx, 1); else tracked.push(id);
        localStorage.setItem('wikelo-tracked', JSON.stringify(tracked));
        updateDisplay();
    }

    function setFilter(f) { 
        filterMode = f; 
        document.querySelectorAll('.filter-group .btn').forEach(b => b.classList.remove('active'));
        document.getElementById('f-' + (f === 'craftable' ? 'craft' : f === 'all' ? 'all' : 'track')).classList.add('active');
        updateDisplay(); 
    }

    function saveConfig() { 
        localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); 
        localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); 
    }

    function resetAll() { if(confirm("PERMANENT_PURGE_MANIFEST?")) { manifest = []; localStorage.setItem('wikelo-manifest-v2', "[]"); renderManifest(); updateDisplay(); } }
    window.onload = loadSystemData;
</script>
</body>
</html>
