<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_SYNC v2.1.0</title>
    <style>
        :root { 
            --t-orange: #FF8C00; 
            --bg: #000000; 
            --card: #050505;
            --border: #FF8C00; 
            --success: #00FF00;
            --error: #FF0000;
            --text-main: #FFFFFF;
            --text-dim: #AAAAAA;
        }
        
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--border) #000; } 

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR STRUCTURE --- */
        .sidebar { 
            width: 420px; 
            border-right: 2px solid var(--border); 
            display: flex;
            flex-direction: column;
            background: var(--bg); 
            flex-shrink: 0; 
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid #222; }
        
        /* --- SUBMISSION FORM --- */
        .submit-section { padding: 20px; background: #080808; border-bottom: 2px solid var(--border); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-grid select, .form-grid input { 
            background: #000; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 8px; 
            font-size: 11px; 
            font-family: monospace;
            outline: none;
        }
        .form-grid select:focus, .form-grid input:focus { border-color: var(--t-orange); }
        .full-width { grid-column: span 2; }

        /* --- LIVE MANIFEST LIST --- */
        .manifest-section { flex: 1; overflow-y: auto; padding: 15px; }
        .manifest-item { 
            background: #0c0c0c; 
            border: 1px solid #222; 
            padding: 10px; 
            margin-bottom: 8px; 
            font-size: 11px;
            position: relative;
        }
        .manifest-item:hover { border-color: #444; }
        .manifest-header { display: flex; justify-content: space-between; color: var(--t-orange); font-weight: bold; margin-bottom: 5px; }
        .manifest-meta { font-size: 9px; color: #666; display: flex; gap: 10px; }
        .manifest-controls { display: flex; gap: 10px; margin-top: 8px; border-top: 1px solid #222; padding-top: 8px; }
        .mini-btn { background: transparent; border: 1px solid #444; color: #888; padding: 4px 8px; cursor: pointer; font-size: 9px; }
        .mini-btn:hover { border-color: var(--t-orange); color: var(--t-orange); }
        .del-btn:hover { border-color: var(--error); color: var(--error); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 25px;
            border-bottom: 2px solid var(--border); 
            background: var(--bg);
        }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

        .card { 
            background: var(--bg); 
            border: 1px solid var(--border); 
            padding: 18px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card.craftable { border-top: 5px solid var(--success); }
        
        .ingred-list { font-size: 12px; list-style: none; padding: 0; margin: 12px 0; }
        .ingred-list li { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }

        .btn { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--t-orange); 
            padding: 8px 15px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 10px; 
            font-weight: bold; 
        }
        .btn:hover { background: var(--t-orange); color: #000; }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; height: auto; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="color:var(--t-orange); font-size:12px; margin:0 0 10px 0;">[ WIKELO_LOGISTICS_v2.1 ]</h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="squad-code" style="background:#000; border:1px solid #333; color:#aaa; padding:5px; font-size:10px; width:50%;" placeholder="SQUAD_CODE" onchange="saveConfig()">
            <input type="text" id="user-handle" style="background:#000; border:1px solid #333; color:#aaa; padding:5px; font-size:10px; width:50%;" placeholder="HANDLE" onchange="saveConfig()">
        </div>
    </div>

    <div class="submit-section">
        <h3 style="font-size:10px; margin-top:0; color:#555;">[ SUBMIT_CARGO ]</h3>
        <div class="form-grid">
            <select id="sub-item" class="full-width"></select>
            <input type="number" id="sub-qty" placeholder="QTY" min="1">
            <input type="text" id="sub-loc" placeholder="LOCATION">
            <button class="btn full-width" onclick="submitCargo()">INITIALIZE_TRANSFER</button>
        </div>
    </div>

    <div class="manifest-section" id="manifest-list">
        </div>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 15px;">MANIFEST // LOADING...</h1>
        <div style="display:flex; gap:8px;">
            <input type="text" id="manifest-search" class="btn" style="width:140px; text-align:left;" placeholder="SEARCH..." oninput="updateDisplay()">
            <button class="btn" onclick="setFilter('craftable')">READY</button>
            <button class="btn" onclick="setFilter('all')">ALL</button>
        </div>
    </div>
    <div class="scroll-area">
        <div id="contract-grid" class="grid"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIb6Ptkl9cSbwpwg79jnfXaFWVrcYu4FJB6P6hD1lMrZi_y2Zyp58WM5VxQchktMle5A/exec";
    
    let MATERIALS = [];
    let CONTRACTS = [];
    let LOCATIONS = {};
    let entries = []; // Array of submission objects
    let filterMode = 'craftable';

    async function loadSystemData() {
        try {
            const dataRes = await fetch('wikelo-data.json');
            const data = await dataRes.json();
            const locRes = await fetch('locations.json');
            if (locRes.ok) LOCATIONS = await locRes.json();

            MATERIALS = data.materials || [];
            CONTRACTS = data.contracts || [];
            
            // Load entries from storage
            entries = JSON.parse(localStorage.getItem('wikelo-manifest-entries')) || [];
            
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            
            populateSelect();
            renderManifest();
            updateDisplay();
            setInterval(syncWithCloud, 20000);
        } catch (e) { console.error("INIT_ERROR", e); }
    }

    function populateSelect() {
        const select = document.getElementById('sub-item');
        select.innerHTML = '<option value="">SELECT_MATERIAL...</option>';
        MATERIALS.sort((a,b) => a.name.localeCompare(b.name)).forEach(m => {
            select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
        });
    }

    function submitCargo() {
        const id = document.getElementById('sub-item').value;
        const qty = parseInt(document.getElementById('sub-qty').value);
        const loc = document.getElementById('sub-loc').value || "UNKNOWN";
        const handle = document.getElementById('user-handle').value || "ANON";

        if (!id || isNaN(qty)) return alert("INVALID_DATA");

        const newEntry = {
            uid: Date.now(),
            id: id,
            qty: qty,
            loc: loc.toUpperCase(),
            user: handle.toUpperCase(),
            ts: new Date().toLocaleTimeString()
        };

        entries.unshift(newEntry);
        saveAndSync();
        
        // Clear form
        document.getElementById('sub-qty').value = '';
        document.getElementById('sub-loc').value = '';
    }

    function renderManifest() {
        const list = document.getElementById('manifest-list');
        list.innerHTML = '<h3 style="font-size:10px; margin-top:0; color:#555;">[ CURRENT_MANIFEST ]</h3>';
        
        if (entries.length === 0) {
            list.innerHTML += '<div style="color:#333; font-size:10px; text-align:center; margin-top:20px;">NO_ACTIVE_CARGO</div>';
            return;
        }

        entries.forEach(entry => {
            const mat = MATERIALS.find(m => m.id === entry.id);
            const item = document.createElement('div');
            item.className = 'manifest-item';
            item.innerHTML = `
                <div class="manifest-header">
                    <span>${mat ? mat.name : entry.id}</span>
                    <span>x${entry.qty}</span>
                </div>
                <div class="manifest-meta">
                    <span>LOC: ${entry.loc}</span>
                    <span>USER: ${entry.user}</span>
                </div>
                <div class="manifest-controls">
                    <button class="mini-btn" onclick="adjustQty(${entry.uid}, 1)">+1</button>
                    <button class="mini-btn" onclick="adjustQty(${entry.uid}, -1)">-1</button>
                    <button class="mini-btn del-btn" onclick="deleteEntry(${entry.uid})">DELETE</button>
                </div>
            `;
            list.appendChild(item);
        });
    }

    function adjustQty(uid, amt) {
        const entry = entries.find(e => e.uid === uid);
        if (entry) {
            entry.qty = Math.max(0, entry.qty + amt);
            if (entry.qty === 0) deleteEntry(uid);
            else saveAndSync();
        }
    }

    function deleteEntry(uid) {
        entries = entries.filter(e => e.uid !== uid);
        saveAndSync();
    }

    function saveAndSync() {
        localStorage.setItem('wikelo-manifest-entries', JSON.stringify(entries));
        renderManifest();
        updateDisplay();
        syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        try {
            const payload = { action: "sync", squadCode: squad, handle: handle, manifest: JSON.stringify(entries) };
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        } catch (e) { }
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        grid.innerHTML = '';
        
        // Sum total quantities for manifest calculation
        const totals = entries.reduce((acc, curr) => {
            acc[curr.id] = (acc[curr.id] || 0) + curr.qty;
            return acc;
        }, {});

        let readyCount = 0;
        CONTRACTS.forEach(c => {
            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const stock = totals[ing.id] || 0;
                if (stock < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                return `<li class="${stock >= ing.qty ? 'status-ready' : 'status-missing'}">
                    ${stock}/${ing.qty} ${mat ? mat.name : ing.id}
                </li>`;
            }).join('');

            if (canCraft) readyCount++;
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft ? 'craftable' : ''}`;
                card.innerHTML = `<div><b style="color:#FFF;">${c.name}</b><ul class="ingred-list">${ingreds}</ul></div><button class="btn">${canCraft ? 'READY_FOR_HANDIN' : 'INCOMPLETE'}</button>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerHTML = `MANIFEST // <span style="color:var(--t-orange);">${readyCount} READY</span>`;
    }

    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); }
    function setFilter(f) { filterMode = f; updateDisplay(); }
    window.onload = loadSystemData;
</script>
</body>
</html>
