    <title>WIKELO::LOGISTICS_SYNC v1.8.6</title>
    <style>
        :root { --t-orange: #FF8C00; --bg: #000; --card: #0a0a0a; --border: #333; --success: #00FF00; --error: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- SIDEBAR --- */
        .sidebar { width: 420px; border-right: 2px solid var(--t-orange); padding: 20px; overflow-y: auto; background: #050505; }
        .sync-panel { background: #111; padding: 15px; border: 1px solid var(--t-orange); margin-bottom: 20px; }
        .sync-status { display: flex; align-items: center; font-size: 10px; margin-top: 10px; }
        .lamp { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: #333; transition: 0.3s; }
        .lamp.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        .tab-header { background: #111; border: 1px solid var(--border); color: var(--t-orange); padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; text-transform: uppercase; font-weight: bold; }
        .tab-content { display: none; padding: 5px; border: 1px solid #222; background: #080808; border-top: none; }
        .tab-content.open { display: block; }
        
        .inv-item { display: grid; grid-template-columns: 1fr 60px 100px; gap: 8px; align-items: center; padding: 6px 8px; border-bottom: 1px solid #111; }
        .inv-item span { font-size: 10px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-item input { background: #000; border: 1px solid var(--t-orange); color: var(--t-orange); text-align: center; font-size: 11px; outline: none; }
        .inv-item input.loc-input { border-color: #333; color: #888; font-size: 9px; text-transform: uppercase; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--t-orange); padding-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; position: relative; transition: 0.2s; }
        .card.craftable { border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .card.pinned { border-left: 4px solid var(--t-orange); }
        .reward-text { color: #a855f7; font-size: 11px; display: block; margin: 5px 0; font-weight: bold; }
        .ingred-list { font-size: 11px; list-style: none; padding: 0; margin: 10px 0; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }
        
        .btn { background: transparent; border: 1px solid var(--t-orange); color: var(--t-orange); padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; font-family: monospace; }
        .active-filter { background: var(--t-orange) !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sync-panel">
        <h2 style="color:var(--t-orange); font-size:12px; margin:0 0 10px 0;">[ CLOUD_SYNC_LOGISTICS ]</h2>
        <input type="text" id="squad-code" class="btn" style="width:100%; text-align:left; margin-bottom:5px;" placeholder="SQUAD_CODE..." onchange="saveConfig()">
        <input type="text" id="user-handle" class="btn" style="width:100%; text-align:left;" placeholder="HANDLE..." onchange="saveConfig()">
        <div class="sync-status">
            <div id="sync-lamp" class="lamp"></div>
            <span id="sync-text">STATUS: INITIALIZING...</span>
        </div>
    </div>
    <div id="inventory-tabs"></div>
    <button class="btn" style="width: 100%; margin-top: 20px; border-color: var(--error); color: var(--error);" onclick="resetAll()">[ WIPE_LOCAL_DATA ]</button>
</div>

<div class="main-content">
    <div class="header-controls">

    // State Initialization
    let MATERIALS = DATABASE.materials;
    let CONTRACTS = DATABASE.contracts;
    let inventory = JSON.parse(localStorage.getItem('wikelo-inventory')) || {};
    let completed = JSON.parse(localStorage.getItem('wikelo-completed')) || [];
    let tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
    let filterMode = 'craftable';

    const CATEGORIES = {
        "currency": "Currency & Scrips",
        "ores": "Raw Materials",
        "creature": "Creature Materials",
        "medals": "Artifacts & Medals",
        "tech": "Tech & RCMBNTs",
        "weapons": "Weapons",
        "gear": "Gear & Vehicles"
    };

    function init() {
        document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
        document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
        renderInventoryTabs();
        updateDisplay();
        setInterval(syncWithCloud, 15000);
        syncWithCloud();
    }

    function renderInventoryTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        Object.entries(CATEGORIES).forEach(([key, label]) => {
            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>[+]</span>`;
            header.onclick = () => {
                const content = header.nextElementSibling;
                content.classList.toggle('open');
                header.querySelector('span:last-child').innerText = content.classList.contains('open') ? '[-]' : '[+]';
            };
            const content = document.createElement('div');
            content.className = 'tab-content';
            MATERIALS.filter(m => m.cat === key).forEach(mat => {
                const data = inventory[mat.id] || { qty: 0, loc: "" };
                const item = document.createElement('div');
                item.className = 'inv-item';
                item.innerHTML = `
                    <span>${mat.name}</span>
                    <input type="number" value="${data.qty}" onchange="updateStock('${mat.id}', 'qty', this.value)">
                    <input type="text" class="loc-input" value="${data.loc}" placeholder="LOC" onchange="updateStock('${mat.id}', 'loc', this.value)">
                `;
                content.appendChild(item);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function updateStock(id, field, val) {
        if (!inventory[id]) inventory[id] = { qty: 0, loc: "" };
        if (field === 'qty') inventory[id].qty = Math.max(0, parseInt(val) || 0);
        else inventory[id].loc = val.toUpperCase();
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        updateDisplay();
        syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        const lamp = document.getElementById('sync-lamp');
        try {
            const payload = { action: "sync", squadCode: squad, handle: handle, inventory: JSON.stringify(inventory), completed: JSON.stringify(completed) };
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            lamp.classList.add('active');
            document.getElementById('sync-text').innerText = "STATUS: CLOUD_SYNC_ACTIVE";
            setTimeout(() => lamp.classList.remove('active'), 1500);
        } catch (e) { document.getElementById('sync-text').innerText = "STATUS: SYNC_ERROR"; }
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        const searchTerm = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        let readyCount = 0;

        CONTRACTS.sort((a,b) => (tracked.includes(b.id) - tracked.includes(a.id)) || a.name.localeCompare(b.name)).forEach(c => {
            const isDone = completed.includes(c.id);
            const isPinned = tracked.includes(c.id);
            
            if (!c.name.toLowerCase().includes(searchTerm) && !c.reward.toLowerCase().includes(searchTerm)) return;

            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const data = inventory[ing.id] || { qty: 0, loc: "" };
                if (data.qty < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                return `<li class="${data.qty >= ing.qty ? 'status-ready' : 'status-missing'}">
                    ${data.qty}/${ing.qty} ${mat ? mat.name : ing.id} ${data.loc ? '<span class="loc-tag">['+data.loc+']</span>' : ''}
                </li>`;
            }).join('');

            if (canCraft && !isDone) readyCount++;
            
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft && !isDone) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft && !isDone ? 'craftable' : ''} ${isPinned ? 'pinned' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-size:9px; color:#555; text-transform:uppercase;">${c.cat}</span>
                        <button class="btn" style="border:none; color:${isPinned ? 'var(--t-orange)' : '#444'}" onclick="toggleTrack('${c.id}')">${isPinned ? '★' : '☆'}</button>
                    </div>
                    <b style="color:#fff;">${c.name}</b><br>
                    <small class="reward-text">REWARD: ${c.reward}</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" ${!canCraft ? 'disabled' : ''} onclick="execute('${c.id}')">
                        ${canCraft ? '[ HAND_IN ]' : '[ INCOMPLETE ]'}
                    </button>
                `;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerText = `MANIFEST :: ${readyCount} READY`;
    }

    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); syncWithCloud(); }
    function toggleTrack(id) { const idx = tracked.indexOf(id); if(idx > -1) tracked.splice(idx, 1); else tracked.push(id); localStorage.setItem('wikelo-tracked', JSON.stringify(tracked)); updateDisplay(); }
    function setFilter(m) { filterMode = m; updateDisplay(); }
    
    function execute(id) { 
        const c = CONTRACTS.find(x => x.id === id); 
        c.ingredients.forEach(ing => {
            if(inventory[ing.id]) inventory[ing.id].qty -= ing.qty;
        }); 
        completed.push(id); 
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory)); 
        localStorage.setItem('wikelo-completed', JSON.stringify(completed)); 
        renderInventoryTabs(); updateDisplay(); syncWithCloud(); 
    }
    
    function resetAll() { if(confirm("WIPE DATA?")) { localStorage.clear(); location.reload(); } }
    window.onload = init;
</script>
