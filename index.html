<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_SYNC v1.9.9</title>
    <style>
        :root { 
            --t-orange: #e67e22; /* Muted Amber */
            --t-orange-dim: rgba(230, 126, 34, 0.2);
            --bg: #0f1113; /* Deep Charcoal */
            --sidebar-bg: #16191c;
            --card: #1c1f23;
            --border: #2d3238;
            --success: #27ae60;
            --error: #c0392b;
            --text-main: #d1d5db;
            --text-dim: #9ca3af;
        }
        
        * { box-sizing: border-box; } 

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 380px; 
            border-right: 1px solid var(--border); 
            padding: 20px; 
            overflow-y: auto; 
            background: var(--sidebar-bg); 
            flex-shrink: 0; 
        }
        
        .sync-panel { 
            background: rgba(0,0,0,0.2); 
            padding: 15px; 
            border: 1px solid var(--border); 
            border-left: 3px solid var(--t-orange);
            margin-bottom: 25px;
            width: 100%;
        }

        .sync-panel input.btn-input {
            width: 100%;
            display: block;
            margin-bottom: 10px;
            text-align: left;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-family: monospace;
            font-size: 11px;
            outline: none;
        }
        .sync-panel input.btn-input:focus { border-color: var(--t-orange); }

        .sync-status { display: flex; align-items: center; font-size: 10px; color: var(--text-dim); }
        .lamp { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #333; }
        .lamp.active { background: var(--success); box-shadow: 0 0 5px var(--success); }
        
        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

        .header-controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 25px;
            border-bottom: 1px solid var(--border); 
            background: var(--sidebar-bg); 
            z-index: 100; 
            width: 100%;
        }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

        /* --- PIN STAR (SVG) --- */
        .pin-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pin-btn svg { width: 20px; height: 20px; fill: none; stroke: var(--t-orange); stroke-width: 2; transition: all 0.2s; }
        .pin-btn.active svg { fill: var(--t-orange); }

        /* --- CARDS --- */
        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 18px; 
            border-radius: 4px;
            transition: transform 0.2s, border-color 0.2s; 
        }
        .card:hover { border-color: #444; }
        .card.craftable { border-top: 3px solid var(--success); }
        .card.pinned { border-left: 3px solid var(--t-orange); }
        
        .reward-text { color: #9b59b6; font-size: 11px; font-weight: bold; text-transform: uppercase; margin: 4px 0; display: block; }
        .ingred-list { font-size: 12px; list-style: none; padding: 0; margin: 12px 0; color: var(--text-dim); }
        .ingred-list li { margin-bottom: 8px; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }
        .wiki-loc { font-size: 10px; color: #555; display: block; margin-top: 2px; font-style: italic; }

        /* --- BUTTONS --- */
        .btn { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text-main); 
            padding: 8px 15px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 10px; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .btn:hover { background: var(--t-orange); color: #000; border-color: var(--t-orange); }
        .active-filter { background: var(--t-orange-dim); color: var(--t-orange); border-color: var(--t-orange); }

        /* --- MOBILE --- */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: auto; }
            .header-controls { flex-direction: column; gap: 15px; position: sticky; top: 0; }
            .grid { grid-template-columns: 1fr; }
        }

        .tab-header { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-dim); padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 10px; margin-top: 4px; text-transform: uppercase; }
        .tab-header:hover { color: var(--t-orange); }
        .tab-content { display: none; padding: 5px; border: 1px solid var(--border); border-top: none; background: rgba(0,0,0,0.1); }
        .tab-content.open { display: block; }
        .inv-item { display: grid; grid-template-columns: 1fr 50px 80px; gap: 5px; align-items: center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sync-panel">
        <h2 style="color:var(--t-orange); font-size:11px; margin:0 0 10px 0; letter-spacing: 1px;">[ LOGISTICS_SYNC ]</h2>
        <input type="text" id="squad-code" class="btn-input" placeholder="SQUAD_CODE..." onchange="saveConfig()">
        <input type="text" id="user-handle" class="btn-input" placeholder="HANDLE..." onchange="saveConfig()">
        <div class="sync-status">
            <div id="sync-lamp" class="lamp"></div>
            <span id="sync-text">LINK_ESTABLISHED</span>
        </div>
    </div>
    <div id="inventory-tabs"></div>
    <button class="btn" style="width: 100%; margin-top: 20px; border-color: var(--error); color: var(--error);" onclick="resetAll()">PURGE_LOCAL_CACHE</button>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 15px; letter-spacing: 1px; color: var(--text-dim);">MANIFEST // <span style="color:var(--t-orange);">READY</span></h1>
        <div style="display:flex; gap:8px;">
            <input type="text" id="manifest-search" class="btn" style="width:140px; text-align:left;" placeholder="SEARCH..." oninput="updateDisplay()">
            <button class="btn" id="f-all" onclick="setFilter('all')">ALL</button>
            <button class="btn active-filter" id="f-craft" onclick="setFilter('craftable')">READY</button>
            <button class="btn" id="f-track" onclick="setFilter('tracked')">PINNED</button>
        </div>
    </div>
    <div class="scroll-area">
        <div id="contract-grid" class="grid"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIb6Ptkl9cSbwpwg79jnfXaFWVrcYu4FJB6P6hD1lMrZi_y2Zyp58WM5VxQchktMle5A/exec";
    
    let MATERIALS = [];
    let CONTRACTS = [];
    let LOCATIONS = {};
    let inventory = {};
    let completed = [];
    let tracked = [];
    let filterMode = 'craftable';

    const CATEGORIES = {
        "currency": "Currency & Scrips",
        "ores": "Raw Materials",
        "creature": "Creature Materials",
        "medals": "Artifacts & Medals",
        "tech": "Tech & RCMBNTs",
        "weapons": "Weapons",
        "gear": "Gear & Vehicles"
    };

    async function loadSystemData() {
        try {
            const dataResponse = await fetch('wikelo-data.json');
            const data = await dataResponse.json();
            const locResponse = await fetch('locations.json');
            if (locResponse.ok) LOCATIONS = await locResponse.json();

            MATERIALS = data.materials || [];
            CONTRACTS = data.contracts || [];
            inventory = JSON.parse(localStorage.getItem('wikelo-inventory')) || {};
            completed = JSON.parse(localStorage.getItem('wikelo-completed')) || [];
            tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
            
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            
            renderInventoryTabs();
            updateDisplay();
            setInterval(syncWithCloud, 15000);
            syncWithCloud();
        } catch (e) { document.getElementById('sync-text').innerText = "DATA_LINK_FAILURE"; }
    }

    function renderInventoryTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        Object.entries(CATEGORIES).forEach(([key, label]) => {
            const mats = MATERIALS.filter(m => m.cat === key);
            if (mats.length === 0) return;
            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>+</span>`;
            header.onclick = () => {
                const content = header.nextElementSibling;
                content.classList.toggle('open');
                header.querySelector('span:last-child').innerText = content.classList.contains('open') ? '-' : '+';
            };
            const content = document.createElement('div');
            content.className = 'tab-content';
            mats.forEach(mat => {
                const data = inventory[mat.id] || { qty: 0, loc: "" };
                const item = document.createElement('div');
                item.className = 'inv-item';
                item.innerHTML = `<span style="font-size:10px;">${mat.name}</span><input type="number" value="${data.qty}" onchange="updateStock('${mat.id}', 'qty', this.value)"><input type="text" style="color:#666; font-size:9px;" value="${data.loc || ''}" placeholder="LOC" onchange="updateStock('${mat.id}', 'loc', this.value)">`;
                content.appendChild(item);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function updateStock(id, field, val) {
        if (!inventory[id]) inventory[id] = { qty: 0, loc: "" };
        if (field === 'qty') inventory[id].qty = Math.max(0, parseInt(val) || 0);
        else inventory[id].loc = (val || "").toUpperCase();
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        updateDisplay();
        syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        try {
            const payload = { action: "sync", squadCode: squad, handle: handle, inventory: JSON.stringify(inventory), completed: JSON.stringify(completed) };
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            const lamp = document.getElementById('sync-lamp');
            lamp.classList.add('active');
            setTimeout(() => lamp.classList.remove('active'), 1500);
        } catch (e) { }
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        const searchTerm = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        let readyCount = 0;
        const sorted = [...CONTRACTS].sort((a,b) => (tracked.includes(b.id) - tracked.includes(a.id)) || a.name.localeCompare(b.name));
        
        sorted.forEach(c => {
            const isDone = completed.includes(c.id);
            const isPinned = tracked.includes(c.id);
            if (!c.name.toLowerCase().includes(searchTerm) && !c.reward.toLowerCase().includes(searchTerm)) return;
            
            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const data = inventory[ing.id] || { qty: 0, loc: "" };
                if (data.qty < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                const wikiLoc = LOCATIONS[ing.id] || "No Data";
                return `<li class="${data.qty >= ing.qty ? 'status-ready' : 'status-missing'}">${data.qty}/${ing.qty} ${mat ? mat.name : ing.id} <span class="wiki-loc">${wikiLoc}</span></li>`;
            }).join('');

            if (canCraft && !isDone) readyCount++;
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft && !isDone) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft && !isDone ? 'craftable' : ''} ${isPinned ? 'pinned' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:10px;">
                        <span style="font-size:9px; color:#555; text-transform:uppercase;">${c.cat}</span>
                        <button class="pin-btn ${isPinned ? 'active' : ''}" onclick="toggleTrack('${c.id}')">
                            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                        </button>
                    </div>
                    <b style="color:var(--text-main); font-size:14px;">${c.name}</b>
                    <small class="reward-text">${c.reward}</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" style="width:100%" ${!canCraft ? 'disabled' : ''} onclick="execute('${c.id}')">${canCraft ? 'INITIALIZE_HAND_IN' : 'RESOURCES_INSUFFICIENT'}</button>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerHTML = `MANIFEST // <span style="color:var(--t-orange);">${readyCount} READY</span>`;
    }

    function toggleTrack(id) { 
        const idx = tracked.indexOf(id); 
        if(idx > -1) tracked.splice(idx, 1); else tracked.push(id); 
        localStorage.setItem('wikelo-tracked', JSON.stringify(tracked)); 
        updateDisplay(); 
    }
    function setFilter(m) { 
        filterMode = m; 
        document.querySelectorAll('.header-controls .btn').forEach(b => b.classList.remove('active-filter'));
        document.getElementById('f-' + (m === 'all' ? 'all' : m === 'craftable' ? 'craft' : 'track')).classList.add('active-filter');
        updateDisplay(); 
    }
    function execute(id) { 
        const c = CONTRACTS.find(x => x.id === id); 
        c.ingredients.forEach(ing => { if(inventory[ing.id]) inventory[ing.id].qty -= ing.qty; }); 
        completed.push(id); 
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory)); 
        localStorage.setItem('wikelo-completed', JSON.stringify(completed)); 
        renderInventoryTabs(); updateDisplay(); syncWithCloud(); 
    }
    function resetAll() { if(confirm("CONFIRM_PURGE?")) { localStorage.clear(); location.reload(); } }
    window.onload = loadSystemData;
</script>
</body>
</html>
