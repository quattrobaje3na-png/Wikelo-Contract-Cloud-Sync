<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_CLOUD_SYNC v2.0</title>
    <style>
        :root { 
            --t-orange: #FF8C00; 
            --bg: #000000; 
            --card: #050505;
            --border: #FF8C00; 
            --success: #00FF00;
            --error: #FF0000;
            --text-main: #FFFFFF;
            --text-dim: #BBBBBB;
        }
        
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--t-orange) #000; } 
        body { background: var(--bg); color: var(--text-main); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 480px; 
            border-right: 2px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg); 
            flex-shrink: 0; 
            height: 100vh;
        }

        .sidebar-header { 
            padding: 20px; 
            border-bottom: 2px solid var(--border); 
            background: #000;
        }

        .sidebar-split {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-scroll-top { 
            height: 50%; 
            overflow-y: auto; 
            padding: 15px; 
            border-bottom: 2px solid var(--border); 
            background: #050505;
        }

        .manifest-zone { 
            height: 50%; 
            background: #000; 
            overflow-y: auto; 
            padding: 15px; 
        }

        /* --- TABS & INPUTS --- */
        .tab-header { border: 2px solid var(--border); color: var(--t-orange); padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; text-transform: uppercase; background: #000; font-weight: bold; letter-spacing: 1px; }
        .tab-content { display: none; padding: 5px; border: 2px solid var(--border); border-top: none; background: #050505; }
        .tab-content.open { display: block; }

        .input-row { display: grid; grid-template-columns: 1fr 50px 80px 45px; gap: 8px; align-items: center; padding: 12px 6px; border-bottom: 1px solid #333; }
        .input-row span { font-size: 12px; color: #fff; font-weight: bold; }
        .input-row input { background: #000; border: 1px solid #666; color: #fff; padding: 8px; font-size: 12px; width: 100%; outline: none; }
        .input-row input:focus { border-color: var(--t-orange); }
        .add-btn { background: var(--t-orange); color: #000; border: none; font-weight: bold; cursor: pointer; height: 32px; font-size: 16px; }

        /* --- MANIFEST LIST --- */
        .manifest-entry { background: #0a0a0a; border: 1px solid #444; padding: 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; align-items: center; }
        .m-info b { color: var(--t-orange); font-size: 13px; display: block; }
        .m-info span { font-size: 11px; color: #FFF; font-style: italic; }
        .del-mini { color: var(--error); border: 2px solid var(--error); background: transparent; font-size: 11px; cursor: pointer; padding: 6px 10px; font-weight: bold; }
        .del-mini:hover { background: var(--error); color: #000; }

        /* --- SYNC LAMP --- */
        .sync-status { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 10px; color: var(--t-orange); font-weight: bold; }
        .lamp { width: 8px; height: 8px; border-radius: 50%; background: #222; border: 1px solid #444; transition: 0.3s; }
        .lamp.active { background: var(--success); box-shadow: 0 0 8px var(--success); border-color: #fff; }

        /* --- MAIN CONTENT HEADER --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 30px; 
            border-bottom: 2px solid var(--border); 
            background: #000; 
        }

        .search-wrap { display: flex; align-items: center; gap: 10px; }
        .search-input { background: #000; border: 2px solid #444; color: #fff; padding: 10px; font-size: 12px; width: 220px; outline: none; }
        .search-input:focus { border-color: var(--t-orange); }

        /* --- PIN STAR --- */
        .pin-btn { background: transparent; border: none; cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; padding: 0; }
        .pin-btn svg { width: 22px; height: 22px; fill: none; stroke: var(--t-orange); stroke-width: 2.5; transition: all 0.2s; }
        .pin-btn.active svg { fill: var(--t-orange); }

        /* --- GRID & CARDS --- */
        .scroll-area { flex: 1; overflow-y: auto; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 30px; }

        .card { background: var(--card); border: 2px solid var(--border); padding: 25px; position: relative; }
        .card.craftable { border-top: 10px solid var(--success); }

        .reward-label { color: #a855f7; font-size: 12px; font-weight: bold; text-transform: uppercase; margin: 6px 0; display: block; letter-spacing: 1.5px; }
        
        .ingred-list { font-size: 14px; list-style: none; padding: 0; margin: 15px 0; }
        .ingred-list > li { margin-bottom: 22px; border-bottom: 1px solid #333; padding-bottom: 14px; }

        .authority-box { font-size: 11px; margin-top: 10px; background: rgba(255,140,0,0.12); padding: 10px; border-left: 3px solid var(--t-orange); color: #FFF; }
        .auth-line { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .auth-line b { color: var(--t-orange); }

        .where-loc { font-size: 10px; color: #DDD; margin-top: 4px; display: block; line-height: 1.4; }
        .where-tag { color: var(--t-orange); font-weight: bold; margin-right: 5px; }

        .btn { background: transparent; border: 2px solid var(--border); color: var(--t-orange); padding: 12px 24px; cursor: pointer; font-size: 12px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .btn:hover { background: var(--t-orange); color: #000; }
        .btn.active { background: var(--t-orange); color: #000; }

        @media (max-width: 1024px) {
            .sidebar { width: 100%; height: auto; border-right: none; }
            body { flex-direction: column; overflow-y: auto; }
            .sidebar-split { height: 900px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="color:var(--t-orange); font-size:15px; margin:0 0 10px 0; letter-spacing: 3px;">[ LOGISTICS_SYNC_V2.0 ]</h2>
        <div style="display:flex; gap:12px;">
            <input type="text" id="squad-code" style="background:#000; border:2px solid #555; color:#fff; padding:10px; font-size:13px; width:50%;" placeholder="SQUAD_CODE..." onchange="saveConfig()">
            <input type="text" id="user-handle" style="background:#000; border:2px solid #555; color:#fff; padding:10px; font-size:13px; width:50%;" placeholder="HANDLE..." onchange="saveConfig()">
        </div>
        <div class="sync-status">
            <div id="sync-lamp" class="lamp"></div>
            <span>LINK_STATUS: STABLE</span>
        </div>
    </div>

    <div class="sidebar-split">
        <div class="sidebar-scroll-top" id="inventory-tabs"></div>
        <div class="manifest-zone" id="manifest-list">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #333; padding-bottom:10px;">
                <h3 style="font-size:13px; color:var(--t-orange); margin:0; letter-spacing: 2px;">[ ACTIVE_MANIFEST ]</h3>
                <button onclick="resetAll()" style="background:transparent; border:2px solid var(--error); color:var(--error); font-size:10px; padding:6px 12px; cursor:pointer; font-weight:bold;">PURGE_ALL</button>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 20px; letter-spacing: 2px; color: #fff;">MANIFEST // <span style="color:var(--t-orange);">0 READY</span></h1>
        
        <div class="search-wrap">
            <input type="text" id="manifest-search" class="search-input" placeholder="SEARCH CONTRACTS..." oninput="updateDisplay()">
            <div class="filter-group" style="display:flex; gap:10px;">
                <button class="btn" id="f-all" onclick="setFilter('all')">ALL</button>
                <button class="btn active" id="f-craft" onclick="setFilter('craftable')">READY</button>
                <button class="btn" id="f-track" onclick="setFilter('tracked')">PINNED</button>
            </div>
        </div>
    </div>
    <div class="scroll-area">
        <div id="contract-grid" class="grid"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIb6Ptkl9cSbwpwg79jnfXaFWVrcYu4FJB6P6hD1lMrZi_y2Zyp58WM5VxQchktMle5A/exec";
    
    let MATERIALS = [];
    let CONTRACTS = [];
    let LOCATIONS = {};
    let localManifest = []; 
    let cloudManifest = []; 
    let tracked = [];
    let filterMode = 'craftable';

    async function loadSystemData() {
        try {
            const dRes = await fetch('wikelo-data.json');
            const d = await dRes.json();
            const lRes = await fetch('locations.json');
            LOCATIONS = lRes.ok ? await lRes.json() : {};

            MATERIALS = d.materials || [];
            CONTRACTS = d.contracts || [];
            localManifest = JSON.parse(localStorage.getItem('wikelo-manifest-v2')) || [];
            tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
            
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            
            renderTabs();
            updateDisplay();

            setInterval(syncWithCloud, 15000);
            syncWithCloud();
        } catch (e) { console.error(e); }
    }

    function renderTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        const cats = { "currency": "Currency", "ores": "Ores", "creature": "Fauna", "medals": "Artifacts", "tech": "Tech", "weapons": "Weapons", "gear": "Gear" };
        
        Object.entries(cats).forEach(([key, label]) => {
            const mats = MATERIALS.filter(m => m.cat === key);
            if (mats.length === 0) return;

            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>+</span>`;
            header.onclick = () => {
                const c = header.nextElementSibling;
                c.classList.toggle('open');
                header.querySelector('span:last-child').innerText = c.classList.contains('open') ? '-' : '+';
            };

            const content = document.createElement('div');
            content.className = 'tab-content';
            mats.forEach(mat => {
                const row = document.createElement('div');
                row.className = 'input-row';
                row.innerHTML = `<span>${mat.name}</span><input type="number" id="qty-${mat.id}" placeholder="QTY"><input type="text" id="loc-${mat.id}" placeholder="LOC"><button class="add-btn" onclick="addToManifest('${mat.id}')">+</button>`;
                content.appendChild(row);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function addToManifest(id) {
        const qI = document.getElementById(`qty-${id}`);
        const lI = document.getElementById(`loc-${id}`);
        const qty = parseInt(qI.value);
        if (!qty || qty <= 0) return;

        localManifest.unshift({
            uid: Date.now(),
            id: id,
            qty: qty,
            loc: (lI.value || "STASH").toUpperCase()
        });
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(localManifest));
        qI.value = ''; lI.value = '';
        updateDisplay();
        syncWithCloud();
    }

    function renderManifestList() {
        const list = document.getElementById('manifest-list');
        const header = list.querySelector('div');
        list.innerHTML = ''; list.appendChild(header);
        
        const handle = (document.getElementById('user-handle').value || "").toUpperCase();
        
        // Render Your Items
        localManifest.forEach(e => {
            const mat = MATERIALS.find(m => m.id === e.id);
            const div = document.createElement('div');
            div.className = 'manifest-entry';
            div.style.borderLeft = "3px solid var(--t-orange)";
            div.innerHTML = `<div class="m-info"><b>${mat ? mat.name : e.id} (x${e.qty})</b><span>LOC: ${e.loc} | AUTH: ${handle} (YOU)</span></div><button class="del-mini" onclick="removeEntry(${e.uid})">X</button>`;
            list.appendChild(div);
        });

        // Render Teammate Items
        cloudManifest.forEach(e => {
            const mat = MATERIALS.find(m => m.id === e.id);
            const div = document.createElement('div');
            div.className = 'manifest-entry';
            div.style.opacity = "0.7";
            div.innerHTML = `<div class="m-info"><b>${mat ? mat.name : e.id} (x${e.qty})</b><span>LOC: ${e.loc} | AUTH: ${e.user}</span></div>`;
            list.appendChild(div);
        });
    }

    function removeEntry(uid) {
        localManifest = localManifest.filter(e => e.uid !== uid);
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(localManifest));
        updateDisplay();
        syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        
        try {
            const payload = { 
                action: "sync", 
                squadCode: squad.toUpperCase(), 
                handle: handle.toUpperCase(), 
                manifest: JSON.stringify(localManifest) 
            };

            const response = await fetch(SCRIPT_URL, { 
                method: "POST", 
                body: JSON.stringify(payload) 
            });

            const rawData = await response.json();
            
            if (Array.isArray(rawData)) {
                cloudManifest = rawData.filter(item => item.user !== handle.toUpperCase());
                updateDisplay();
            }

            const lamp = document.getElementById('sync-lamp');
            lamp.classList.add('active');
            setTimeout(() => lamp.classList.remove('active'), 1500);

        } catch (e) { console.error("CLOUD_SYNC_ERROR", e); }
    }

    function updateDisplay() {
        renderManifestList();
        
        const grid = document.getElementById('contract-grid');
        const searchTerm = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        
        const combined = [...localManifest, ...cloudManifest];
        const totals = combined.reduce((acc, curr) => {
            acc[curr.id] = (acc[curr.id] || 0) + curr.qty;
            return acc;
        }, {});

        let readyCount = 0;
        CONTRACTS.forEach(c => {
            const isPinned = tracked.includes(c.id);
            if (!c.name.toLowerCase().includes(searchTerm) && !c.reward.toLowerCase().includes(searchTerm)) return;

            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const stock = totals[ing.id] || 0;
                if (stock < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                const locStr = LOCATIONS[ing.id] || "DATA_UNAVAILABLE";
                
                const contributors = combined.filter(e => e.id === ing.id);
                const authorityHTML = contributors.length > 0 ? 
                    `<div class="authority-box">` + 
                    contributors.map(e => `<div class="auth-line"><span>[${e.qty}] @ ${e.loc}</span><b>${e.user === (document.getElementById('user-handle').value || "").toUpperCase() ? 'YOU' : e.user}</b></div>`).join('') + 
                    `</div>` : '';

                return `<li class="${stock >= ing.qty ? 'status-ready' : 'status-missing'}">
                    <div style="display:flex; justify-content:space-between; align-items: baseline;">
                        <b style="font-size:15px; color:${stock >= ing.qty ? 'var(--success)' : 'inherit'}">${stock}/${ing.qty} ${mat ? mat.name : ing.id}</b>
                        <span class="where-loc" style="text-align:right;"><span class="where-tag">REF:</span>${locStr}</span>
                    </div>
                    ${authorityHTML}
                </li>`;
            }).join('');

            if (canCraft) readyCount++;
            
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft ? 'craftable' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:12px;">
                        <span style="font-size:10px; color:#AAA; font-weight:bold; text-transform:uppercase;">${c.cat}</span>
                        <button class="pin-btn ${isPinned ? 'active' : ''}" onclick="toggleTrack('${c.id}')">
                            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                        </button>
                    </div>
                    <b style="font-size:18px;">${c.name}</b>
                    <small class="reward-label">${c.reward}</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" style="width:100%" ${!canCraft ? 'disabled' : ''}>${canCraft ? 'INITIALIZE_HAND_IN' : 'RESOURCES_INSUFFICIENT'}</button>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerHTML = `MANIFEST // <span style="color:var(--t-orange);">${readyCount} READY</span>`;
    }

    function toggleTrack(id) {
        const idx = tracked.indexOf(id);
        if(idx > -1) tracked.splice(idx, 1); else tracked.push(id);
        localStorage.setItem('wikelo-tracked', JSON.stringify(tracked));
        updateDisplay();
    }

    function setFilter(f) { 
        filterMode = f; 
        document.querySelectorAll('.filter-group .btn').forEach(b => b.classList.remove('active'));
        document.getElementById('f-' + (f === 'craftable' ? 'craft' : f === 'all' ? 'all' : 'track')).classList.add('active');
        updateDisplay(); 
    }

    function saveConfig() { 
        localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); 
        localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); 
        syncWithCloud();
    }

    function resetAll() { if(confirm("PERMANENT_PURGE_LOCAL_MANIFEST?")) { localManifest = []; localStorage.setItem('wikelo-manifest-v2', "[]"); updateDisplay(); syncWithCloud(); } }
    window.onload = loadSystemData;
</script>
</body>
</html>
