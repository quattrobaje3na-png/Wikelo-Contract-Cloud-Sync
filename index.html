<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_SYNC v2.2.2</title>
    <style>
        :root { 
            --t-orange: #FF8C00; 
            --bg: #000000; 
            --card: #050505;
            --border: #FF8C00; 
            --success: #00FF00;
            --error: #FF0000;
            --text-main: #FFFFFF;
            --text-dim: #777;
        }
        
        * { box-sizing: border-box; } 
        body { background: var(--bg); color: var(--text-main); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR RE-STRUCTURE --- */
        .sidebar { width: 480px; border-right: 2px solid var(--border); display: flex; flex-direction: column; background: var(--bg); flex-shrink: 0; height: 100vh; }
        .sidebar-header { padding: 15px; border-bottom: 2px solid var(--border); background: #0a0a0a; }
        .sidebar-split { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-scroll-top { height: 50%; overflow-y: auto; padding: 15px; border-bottom: 2px solid var(--border); background: #050505; }
        .manifest-zone { height: 50%; background: #000; overflow-y: auto; padding: 15px; position: relative; }

        /* TAB STYLING */
        .tab-header { border: 1px solid #333; color: var(--t-orange); padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 10px; margin-top: 5px; text-transform: uppercase; background: #000; }
        .tab-content { display: none; padding: 5px; border: 1px solid #222; border-top: none; background: #050505; }
        .tab-content.open { display: block; }

        /* INPUT ROWS */
        .input-row { display: grid; grid-template-columns: 1fr 50px 80px 45px; gap: 6px; align-items: center; padding: 10px 4px; border-bottom: 1px solid #111; }
        .input-row span { font-size: 11px; color: #fff; }
        .input-row input { background: #000; border: 1px solid #444; color: #fff; padding: 6px; font-size: 11px; width: 100%; outline: none; }
        .add-btn { background: var(--t-orange); color: #000; border: none; font-weight: bold; cursor: pointer; height: 28px; }

        /* MANIFEST ENTRIES (Left Sidebar) */
        .manifest-entry { background: #0a0a0a; border: 1px solid #333; padding: 10px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto; align-items: center; }
        .m-info b { color: var(--t-orange); font-size: 11px; display: block; }
        .m-info span { font-size: 9px; color: #666; }

        /* RECIPE CARDS (Right Side) */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 2px solid var(--border); background: #000; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }

        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; }
        .card.craftable { border-top: 5px solid var(--success); }
        .ingred-list { font-size: 12px; list-style: none; padding: 0; margin: 12px 0; }
        .ingred-list > li { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* Authority / Logistics Breakdown inside Recipes */
        .authority-list { font-size: 9px; margin-top: 5px; background: rgba(255,140,0,0.05); padding: 5px; border-left: 1px solid var(--t-orange); }
        .auth-entry { display: flex; justify-content: space-between; color: #888; margin-bottom: 2px; }
        .auth-entry b { color: #aaa; }

        .btn { background: transparent; border: 1px solid var(--border); color: var(--t-orange); padding: 8px 15px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .btn:hover { background: var(--t-orange); color: #000; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="color:var(--t-orange); font-size:12px; margin:0 0 10px 0;">[ LOGISTICS_SYNC ]</h2>
        <div style="display:flex; gap:8px;">
            <input type="text" id="squad-code" style="background:#000; border:1px solid #444; color:#fff; padding:8px; font-size:11px; width:50%;" placeholder="SQUAD_CODE" onchange="saveConfig()">
            <input type="text" id="user-handle" style="background:#000; border:1px solid #444; color:#fff; padding:8px; font-size:11px; width:50%;" placeholder="HANDLE" onchange="saveConfig()">
        </div>
    </div>

    <div class="sidebar-split">
        <div class="sidebar-scroll-top" id="inventory-tabs"></div>
        <div class="manifest-zone" id="manifest-list">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:5px;">
                <h3 style="font-size:11px; color:var(--t-orange); margin:0;">[ ACTIVE_MANIFEST ]</h3>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 15px;">MANIFEST // READY: <span style="color:var(--t-orange);">0</span></h1>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="setFilter('craftable')">SHOW_READY</button>
            <button class="btn" onclick="setFilter('all')">SHOW_ALL</button>
        </div>
    </div>
    <div class="scroll-area">
        <div id="contract-grid" class="grid"></div>
    </div>
</div>

<script>
    let MATERIALS = [];
    let CONTRACTS = [];
    let LOCATIONS = {};
    let manifest = []; 
    let filterMode = 'craftable';

    async function loadSystemData() {
        try {
            const dataRes = await fetch('wikelo-data.json');
            const data = await dataRes.json();
            const locRes = await fetch('locations.json');
            if (locRes.ok) LOCATIONS = await locRes.json();

            MATERIALS = data.materials || [];
            CONTRACTS = data.contracts || [];
            manifest = JSON.parse(localStorage.getItem('wikelo-manifest-v2')) || [];
            
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            
            renderTabs();
            renderManifest();
            updateDisplay();
        } catch (e) { console.error(e); }
    }

    function renderTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        const cats = { "currency": "Currency", "ores": "Ores", "creature": "Fauna", "medals": "Artifacts", "tech": "Tech", "weapons": "Weapons", "gear": "Gear" };
        
        Object.entries(cats).forEach(([key, label]) => {
            const mats = MATERIALS.filter(m => m.cat === key);
            if (mats.length === 0) return;
            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>+</span>`;
            header.onclick = () => {
                const c = header.nextElementSibling;
                c.classList.toggle('open');
                header.querySelector('span:last-child').innerText = c.classList.contains('open') ? '-' : '+';
            };
            const content = document.createElement('div');
            content.className = 'tab-content';
            mats.forEach(mat => {
                const row = document.createElement('div');
                row.className = 'input-row';
                row.innerHTML = `<span>${mat.name}</span><input type="number" id="qty-${mat.id}" placeholder="QTY"><input type="text" id="loc-${mat.id}" placeholder="LOC"><button class="add-btn" onclick="addToManifest('${mat.id}')">+</button>`;
                content.appendChild(row);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function addToManifest(id) {
        const qtyIn = document.getElementById(`qty-${id}`);
        const locIn = document.getElementById(`loc-${id}`);
        const qty = parseInt(qtyIn.value);
        if (!qty || qty <= 0) return;

        manifest.unshift({
            uid: Date.now(),
            id: id,
            qty: qty,
            loc: (locIn.value || "UNKNOWN").toUpperCase(),
            user: (document.getElementById('user-handle').value || "ANON").toUpperCase()
        });
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(manifest));
        qtyIn.value = ''; locIn.value = '';
        renderManifest(); updateDisplay();
    }

    function renderManifest() {
        const list = document.getElementById('manifest-list');
        const header = list.querySelector('div');
        list.innerHTML = ''; list.appendChild(header);
        manifest.forEach(e => {
            const mat = MATERIALS.find(m => m.id === e.id);
            const div = document.createElement('div');
            div.className = 'manifest-entry';
            div.innerHTML = `<div class="m-info"><b>${mat ? mat.name : e.id} (x${e.qty})</b><span>LOC: ${e.loc} | BY: ${e.user}</span></div><button class="del-mini" onclick="removeEntry(${e.uid})">X</button>`;
            list.appendChild(div);
        });
    }

    function removeEntry(uid) {
        manifest = manifest.filter(e => e.uid !== uid);
        localStorage.setItem('wikelo-manifest-v2', JSON.stringify(manifest));
        renderManifest(); updateDisplay();
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        grid.innerHTML = '';
        const totals = manifest.reduce((acc, curr) => {
            acc[curr.id] = (acc[curr.id] || 0) + curr.qty;
            return acc;
        }, {});

        let readyCount = 0;
        CONTRACTS.forEach(c => {
            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const stock = totals[ing.id] || 0;
                if (stock < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                
                // Get list of specific squad entries for this material
                const squadEntries = manifest.filter(e => e.id === ing.id);
                const authorityHTML = squadEntries.length > 0 ? 
                    `<div class="authority-list">` + 
                    squadEntries.map(e => `<div class="auth-entry"><span>[${e.qty}] @ ${e.loc}</span><b>AUTH: ${e.user}</b></div>`).join('') + 
                    `</div>` : '';

                return `<li class="${stock >= ing.qty ? 'status-ready' : 'status-missing'}">
                    <b>${stock}/${ing.qty} ${mat ? mat.name : ing.id}</b>
                    ${authorityHTML}
                </li>`;
            }).join('');

            if (canCraft) readyCount++;
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft ? 'craftable' : ''}`;
                card.innerHTML = `<div><b style="color:#FFF; font-size:16px;">${c.name}</b><ul class="ingred-list">${ingreds}</ul></div>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerHTML = `MANIFEST // READY: <span style="color:var(--t-orange);">${readyCount}</span>`;
    }

    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); }
    function setFilter(f) { filterMode = f; updateDisplay(); }
    window.onload = loadSystemData;
</script>
</body>
</html>
