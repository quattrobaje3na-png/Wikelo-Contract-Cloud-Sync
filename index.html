<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIKELO::CONTRACT_TRACKER v1.6</title>
    <style>
        :root { --t-orange: #FF8C00; --bg: #000; --card: #0a0a0a; --border: #333; --success: #00FF00; --error: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- SIDEBAR & COLLAPSIBLE TABS --- */
        .sidebar { width: 380px; border-right: 2px solid var(--t-orange); padding: 20px; overflow-y: auto; background: #050505; }
        .tab-header { 
            background: #111; border: 1px solid var(--border); color: var(--t-orange); 
            padding: 10px; cursor: pointer; display: flex; justify-content: space-between; 
            font-size: 11px; margin-top: 5px; text-transform: uppercase; font-weight: bold;
        }
        .tab-header:hover { background: #1a1a1a; }
        .tab-content { display: none; padding: 5px; border: 1px solid #222; border-top: none; background: #080808; }
        .tab-content.open { display: block; }
        
        .inv-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; padding: 4px 8px; border-bottom: 1px solid #111; }
        .inv-item span { font-size: 11px; color: #aaa; }
        .inv-item input { width: 50px; background: #000; border: 1px solid var(--t-orange); color: var(--t-orange); text-align: center; font-size: 11px; outline: none; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--t-orange); padding-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; position: relative; }
        .card.craftable { border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .card.pinned { border-left: 4px solid var(--t-orange); }
        .reward-text { color: #a855f7; font-size: 11px; display: block; margin: 5px 0; }
        .ingred-list { font-size: 11px; list-style: none; padding: 0; margin: 10px 0; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }
        .btn { background: transparent; border: 1px solid var(--t-orange); color: var(--t-orange); padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; font-family: monospace; }
        .active-filter { background: var(--t-orange) !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--t-orange); font-size: 14px;">[ STOCK_LEDGER ]</h2>
    <div id="inventory-tabs">
        </div>
    <button class="btn" style="width: 100%; margin-top: 20px; border-color: var(--error); color: var(--error);" onclick="resetAll()">[ WIPE_DATA ]</button>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header">WIKELO::MANIFEST</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="text" id="manifest-search" class="btn" style="width:200px; text-align:left;" placeholder="SEARCH..." oninput="updateDisplay()">
            <button class="btn" id="f-all" onclick="setFilter('all')">ALL</button>
            <button class="btn active-filter" id="f-craft" onclick="setFilter('craftable')">READY</button>
            <button class="btn" id="f-track" onclick="setFilter('tracked')">PINNED</button>
        </div>
    </div>
    <div id="contract-grid" class="grid"></div>
</div>

<script>
    let MATERIALS = [];
    let CONTRACTS = [];
    let inventory = JSON.parse(localStorage.getItem('wikelo-inventory')) || {};
    let completed = JSON.parse(localStorage.getItem('wikelo-completed')) || [];
    let tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
    let filterMode = 'craftable';

    const CATEGORIES = {
        "currency": "Currency & Scrips",
        "ores": "Raw Materials",
        "creature": "Creature Materials",
        "medals": "Artifacts & Medals",
        "tech": "Tech & RCMBNTs",
        "gear": "Weapons, Gear & Vehicles"
    };

    async function loadSystemData() {
        const response = await fetch('wikelo-data.json');
        const data = await response.json();
        MATERIALS = data.materials;
        CONTRACTS = data.contracts;
        renderInventoryTabs();
        updateDisplay();
    }

    function renderInventoryTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        
        Object.entries(CATEGORIES).forEach(([key, label]) => {
            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>[+]</span>`;
            header.onclick = () => {
                const content = header.nextElementSibling;
                content.classList.toggle('open');
                header.querySelector('span:last-child').innerText = content.classList.contains('open') ? '[-]' : '[+]';
            };

            const content = document.createElement('div');
            content.className = 'tab-content';
            
            MATERIALS.filter(m => m.cat === key).forEach(mat => {
                const item = document.createElement('div');
                item.className = 'inv-item';
                item.innerHTML = `<span>${mat.name}</span><input type="number" value="${inventory[mat.id] || 0}" onchange="updateStock('${mat.id}', this.value)">`;
                content.appendChild(item);
            });

            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function updateStock(id, val) {
        inventory[id] = Math.max(0, parseInt(val) || 0);
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        updateDisplay();
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        const searchTerm = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        let readyCount = 0;

        CONTRACTS.sort((a,b) => (tracked.includes(b.id) - tracked.includes(a.id)) || a.name.localeCompare(b.name))
        .forEach(c => {
            const isDone = completed.includes(c.id);
            const isPinned = tracked.includes(c.id);
            if (!c.name.toLowerCase().includes(searchTerm) && !c.reward.toLowerCase().includes(searchTerm)) return;

            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const owned = inventory[ing.id] || 0;
                if (owned < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                return `<li class="${owned >= ing.qty ? 'status-ready' : 'status-missing'}">${owned}/${ing.qty} ${mat ? mat.name : ing.id}</li>`;
            }).join('');

            if (canCraft && !isDone) readyCount++;
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft && !isDone) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft && !isDone ? 'craftable' : ''} ${isPinned ? 'pinned' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <span class="card-cat">${c.cat}</span>
                        <button class="btn" style="border:none; color:${isPinned ? 'var(--t-orange)' : '#444'}" onclick="toggleTrack('${c.id}')">${isPinned ? '★' : '☆'}</button>
                    </div>
                    <b>${c.name}</b><br><small class="reward-text">${c.reward}</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" ${!canCraft ? 'disabled' : ''} onclick="execute('${c.id}')">${canCraft ? '[ HAND_IN ]' : '[ INCOMPLETE ]'}</button>
                `;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerText = `MANIFEST :: ${readyCount} READY`;
    }

    function toggleTrack(id) {
        const idx = tracked.indexOf(id);
        if(idx > -1) tracked.splice(idx, 1); else tracked.push(id);
        localStorage.setItem('wikelo-tracked', JSON.stringify(tracked));
        updateDisplay();
    }

    function setFilter(mode) {
        filterMode = mode;
        ['f-all', 'f-craft', 'f-track'].forEach(id => document.getElementById(id).classList.remove('active-filter'));
        document.getElementById(`f-${mode === 'tracked' ? 'track' : mode === 'craftable' ? 'craft' : 'all'}`).classList.add('active-filter');
        updateDisplay();
    }

    function execute(id) {
        const c = CONTRACTS.find(x => x.id === id);
        c.ingredients.forEach(ing => inventory[ing.id] -= ing.qty);
        completed.push(id);
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        localStorage.setItem('wikelo-completed', JSON.stringify(completed));
        renderInventoryTabs(); updateDisplay();
    }

    function resetAll() { if(confirm("WIPE PROGRESS?")) { localStorage.clear(); location.reload(); } }
    window.onload = loadSystemData;
</script>
</body>
</html>
