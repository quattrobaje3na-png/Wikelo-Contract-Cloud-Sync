<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIKELO::LOGISTICS_SYNC v1.8.2</title>
    <style>
        :root { --t-orange: #FF8C00; --bg: #000; --card: #0a0a0a; --border: #333; --success: #00FF00; --error: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- SIDEBAR --- */
        .sidebar { width: 420px; border-right: 2px solid var(--t-orange); padding: 20px; overflow-y: auto; background: #050505; }
        .sync-panel { background: #111; padding: 15px; border: 1px solid var(--t-orange); margin-bottom: 20px; }
        .sync-status { display: flex; align-items: center; font-size: 10px; margin-top: 10px; }
        .lamp { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: #333; transition: 0.3s; }
        .lamp.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        .tab-header { background: #111; border: 1px solid var(--border); color: var(--t-orange); padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; text-transform: uppercase; font-weight: bold; }
        .tab-content { display: none; padding: 5px; border: 1px solid #222; background: #080808; border-top: none; }
        .tab-content.open { display: block; }
        
        .inv-item { display: grid; grid-template-columns: 1fr 50px 100px; gap: 8px; align-items: center; padding: 6px 8px; border-bottom: 1px solid #111; }
        .inv-item span { font-size: 10px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-item input { background: #000; border: 1px solid var(--t-orange); color: var(--t-orange); text-align: center; font-size: 11px; outline: none; }
        .inv-item input.loc-input { border-color: #333; color: #888; font-size: 9px; text-transform: uppercase; }
        .inv-item input.loc-input:focus { border-color: var(--t-orange); color: var(--t-orange); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--t-orange); padding-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; transition: 0.2s; position: relative; }
        .card.craftable { border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .card.pinned { border-left: 4px solid var(--t-orange); }
        .reward-text { color: #a855f7; font-size: 11px; display: block; margin: 5px 0; font-weight: bold; }
        .ingred-list { font-size: 11px; list-style: none; padding: 0; margin: 10px 0; }
        .loc-tag { color: #666; font-size: 9px; margin-left: 5px; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }
        
        .btn { background: transparent; border: 1px solid var(--t-orange); color: var(--t-orange); padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; font-family: monospace; }
        .btn:hover:not(:disabled) { background: rgba(255,140,0,0.1); }
        .active-filter { background: var(--t-orange) !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sync-panel">
        <h2 style="color:var(--t-orange); font-size:12px; margin:0 0 10px 0;">[ CLOUD_SYNC_LOGISTICS ]</h2>
        <input type="text" id="squad-code" class="btn" style="width:100%; text-align:left; margin-bottom:5px;" placeholder="SQUAD_CODE..." onchange="saveConfig()">
        <input type="text" id="user-handle" class="btn" style="width:100%; text-align:left;" placeholder="HANDLE..." onchange="saveConfig()">
        <div class="sync-status">
            <div id="sync-lamp" class="lamp"></div>
            <span id="sync-text">STATUS: LOCAL_ONLY</span>
        </div>
    </div>
    <div id="inventory-tabs"></div>
    <button class="btn" style="width: 100%; margin-top: 20px; border-color: var(--error); color: var(--error);" onclick="resetAll()">[ WIPE_LOCAL_DATA ]</button>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header">WIKELO::MANIFEST</h1>
        <div style="display:flex; gap:8px; align-items:center;">
            <input type="text" id="manifest-search" class="btn" style="width:180px; text-align:left;" placeholder="SEARCH..." oninput="updateDisplay()">
            <button class="btn" onclick="setFilter('all')">ALL</button>
            <button class="btn active-filter" id="f-craft" onclick="setFilter('craftable')">READY</button>
            <button class="btn" onclick="setFilter('tracked')">PINNED</button>
        </div>
    </div>
    <div id="contract-grid" class="grid"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywgKsYfx5yZP2cgLDlfsKia5hEcbS5LrJ6v4SQtdzRF4CyBGPYtfz_gnTiNbO3gaCxUA/exec";

    // --- BAKED-IN MASTER DATABASE ---
    const DATABASE = {
        "materials": [
            {"id":"wikelo-favor","name":"Wikelo Favor","cat":"currency"},{"id":"mg-scrip","name":"MG Scrip","cat":"currency"},{"id":"polaris-bit","name":"Polaris Bit","cat":"currency"},{"id":"council-scrip","name":"Council Scrip","cat":"currency"},
            {"id":"quantainium","name":"Quantainium","cat":"ores"},{"id":"carinite","name":"Carinite","cat":"ores"},{"id":"carinite-pure","name":"Carinite (Pure)","cat":"ores"},{"id":"jaclium","name":"Jaclium (Ore)","cat":"ores"},{"id":"saldynium","name":"Saldynium (Ore)","cat":"ores"},
            {"id":"valakkar-pearl-aaa","name":"Irradiated Pearl (AAA)","cat":"creature"},{"id":"valakkar-pearl-aa","name":"Irradiated Pearl (AA)","cat":"creature"},{"id":"valakkar-fang-apex","name":"Fang (Apex)","cat":"creature"},{"id":"valakkar-fang-adult","name":"Fang (Adult)","cat":"creature"},{"id":"valakkar-fang-juvenile","name":"Fang (Juvenile)","cat":"creature"},{"id":"tundra-kopion-horn","name":"Kopion Horn","cat":"creature"},{"id":"yormandi-eye","name":"Yormandi Eye","cat":"creature"},{"id":"yormandi-tongue","name":"Yormandi Tongue","cat":"creature"},
            {"id":"uee-medal","name":"UEE Medal (Pristine)","cat":"medals"},{"id":"tevarin-marker","name":"Tevarin Marker (Pristine)","cat":"medals"},{"id":"gov-medal","name":"GCA Medal (Pristine)","cat":"medals"},{"id":"artefact-fragment","name":"Artefact Fragment (Pristine)","cat":"medals"},
            {"id":"asd-secure-drive","name":"ASD Secure Drive","cat":"tech"},{"id":"comp-board","name":"DCHS-05 Comp-Board","cat":"tech"},{"id":"nn-13-cannon","name":"NN-13 Cannon","cat":"tech"},{"id":"rcmbnt-pwl-1","name":"RCMBNT-PWL-1","cat":"tech"},{"id":"rcmbnt-pwl-2","name":"RCMBNT-PWL-2","cat":"tech"},{"id":"rcmbnt-pwl-3","name":"RCMBNT-PWL-3","cat":"tech"},{"id":"rcmbnt-rgl-1","name":"RCMBNT-RGL-1","cat":"tech"},{"id":"rcmbnt-rgl-2","name":"RCMBNT-RGL-2","cat":"tech"},{"id":"rcmbnt-rgl-3","name":"RCMBNT-RGL-3","cat":"tech"},{"id":"rcmbnt-xtl-1","name":"RCMBNT-XTL-1","cat":"tech"},{"id":"rcmbnt-xtl-2","name":"RCMBNT-XTL-2","cat":"tech"},{"id":"rcmbnt-xtl-3","name":"RCMBNT-XTL-3","cat":"tech"},
            {"id":"parallax-rifle","name":"Parallax Energy AR","cat":"weapons"},{"id":"prism-shotgun","name":"Prism Laser Shotgun","cat":"weapons"},{"id":"zenith-sniper","name":"Zenith Sniper Rifle","cat":"weapons"},{"id":"fresnel-lmg","name":"Fresnel Energy LMG","cat":"weapons"},{"id":"boomtube-launcher","name":"Boomtube Launcher","cat":"weapons"},{"id":"tripledown-pistol","name":"Tripledown Pistol","cat":"weapons"},
            {"id":"argo-atls","name":"Argo ATLS","cat":"gear"},{"id":"ace-helmet","name":"Ace Helmet","cat":"gear"},{"id":"vanduul-plating","name":"Vanduul Plating","cat":"gear"},{"id":"vanduul-metal","name":"Vanduul Metal","cat":"gear"},{"id":"antium-core","name":"Antium Core","cat":"gear"},{"id":"antium-helmet","name":"Antium Helmet","cat":"gear"},{"id":"antium-legs","name":"Antium Legs","cat":"gear"},{"id":"antium-arms","name":"Antium Arms","cat":"gear"},{"id":"geist-core","name":"Geist Core","cat":"gear"},{"id":"geist-helmet","name":"Geist Helmet","cat":"gear"},{"id":"geist-legs","name":"Geist Legs","cat":"gear"},{"id":"geist-arms","name":"Geist Arms","cat":"gear"},{"id":"geist-backpack","name":"Geist Backpack","cat":"gear"},{"id":"strata-core","name":"Strata Core","cat":"gear"},{"id":"strata-helmet","name":"Strata Helmet","cat":"gear"},{"id":"strata-arms","name":"Strata Arms","cat":"gear"},{"id":"strata-legs","name":"Strata Legs","cat":"gear"},{"id":"strata-backpack","name":"Strata Backpack","cat":"gear"},{"id":"corbel-core","name":"Corbel Core","cat":"gear"},{"id":"corbel-helmet","name":"Corbel Helmet","cat":"gear"},{"id":"corbel-legs","name":"Corbel Legs","cat":"gear"},{"id":"corbel-arms","name":"Corbel Arms","cat":"gear"},{"id":"corbel-backpack","name":"Corbel Backpack","cat":"gear"},{"id":"palatino-core","name":"Palatino Core","cat":"gear"},{"id":"palatino-helmet","name":"Palatino Helmet","cat":"gear"},{"id":"palatino-legs","name":"Palatino Legs","cat":"gear"},{"id":"palatino-arms","name":"Palatino Arms","cat":"gear"},{"id":"palatino-backpack","name":"Palatino Backpack","cat":"gear"},{"id":"testudo-core","name":"Testudo Core","cat":"gear"},{"id":"testudo-helmet","name":"Testudo Helmet","cat":"gear"},{"id":"testudo-arms","name":"Testudo Arms","cat":"gear"},{"id":"testudo-legs","name":"Testudo Legs","cat":"gear"},{"id":"testudo-backpack","name":"Testudo Backpack","cat":"gear"}
        ],
        "contracts": [
            {"id":"ana-endro","cat":"armor","name":"Armor horn/string","reward":"Ana Armor Endro Set","ingredients":[{"id":"carinite-pure","qty":1},{"id":"antium-core","qty":1},{"id":"antium-helmet","qty":1},{"id":"antium-legs","qty":1},{"id":"antium-arms","qty":1}]},
            {"id":"bokto-armor","cat":"armor","name":"Glowy armor","reward":"Bokto Armor Set","ingredients":[{"id":"valakkar-pearl-aaa","qty":1},{"id":"antium-core","qty":1},{"id":"antium-helmet","qty":1},{"id":"antium-legs","qty":1},{"id":"antium-arms","qty":1}]},
            {"id":"geist-snow","cat":"armor","name":"Snow Suit","reward":"Geist Snow Camo Set","ingredients":[{"id":"asd-secure-drive","qty":4},{"id":"geist-helmet","qty":1},{"id":"geist-core","qty":1},{"id":"geist-legs","qty":1},{"id":"geist-arms","qty":1},{"id":"geist-backpack","qty":1}]},
            {"id":"strata-heatwave","cat":"armor","name":"Lava Suit","reward":"Strata Heatwave Set","ingredients":[{"id":"carinite","qty":30},{"id":"rcmbnt-pwl-1","qty":4},{"id":"rcmbnt-pwl-2","qty":4},{"id":"rcmbnt-pwl-3","qty":4},{"id":"strata-core","qty":1},{"id":"strata-arms","qty":1},{"id":"strata-legs","qty":1},{"id":"strata-helmet","qty":1},{"id":"strata-backpack","qty":1}]},
            {"id":"atls-ikti","cat":"vehicle","name":"ATLS shoot","reward":"ATLS IKTI","ingredients":[{"id":"argo-atls","qty":1},{"id":"wikelo-favor","qty":2},{"id":"valakkar-fang-apex","qty":5},{"id":"nn-13-cannon","qty":2}]},
            {"id":"polaris-special","cat":"ship","name":"Polaris build","reward":"RSI Polaris Special","ingredients":[{"id":"wikelo-favor","qty":50},{"id":"polaris-bit","qty":15},{"id":"asd-secure-drive","qty":15},{"id":"comp-board","qty":10},{"id":"carinite-pure","qty":15}]},
            {"id":"idris-special","cat":"ship","name":"Special Idris","reward":"Aegis Idris-P Special","ingredients":[{"id":"wikelo-favor","qty":50},{"id":"polaris-bit","qty":50},{"id":"comp-board","qty":50},{"id":"carinite","qty":50},{"id":"valakkar-fang-apex","qty":50},{"id":"mg-scrip","qty":50},{"id":"ace-helmet","qty":50},{"id":"valakkar-pearl-aaa","qty":30},{"id":"uee-medal","qty":30},{"id":"asd-secure-drive","qty":30},{"id":"carinite-pure","qty":30}]}
        ]
    };

    let MATERIALS = DATABASE.materials;
    let CONTRACTS = DATABASE.contracts;
    let inventory = JSON.parse(localStorage.getItem('wikelo-inventory')) || {};
    let completed = JSON.parse(localStorage.getItem('wikelo-completed')) || [];
    let tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
    let filterMode = 'craftable';

    const CATEGORIES = {
        "currency": "Currency & Scrips",
        "ores": "Raw Materials",
        "creature": "Creature Materials",
        "medals": "Artifacts & Medals",
        "tech": "Tech & RCMBNTs",
        "weapons": "Weapons",
        "gear": "Gear & Vehicles"
    };

    function init() {
        document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
        document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
        renderInventoryTabs();
        updateDisplay();
        setInterval(syncWithCloud, 15000);
        syncWithCloud();
    }

    function renderInventoryTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        Object.entries(CATEGORIES).forEach(([key, label]) => {
            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>[+]</span>`;
            header.onclick = () => {
                const content = header.nextElementSibling;
                content.classList.toggle('open');
                header.querySelector('span:last-child').innerText = content.classList.contains('open') ? '[-]' : '[+]';
            };
            const content = document.createElement('div');
            content.className = 'tab-content';
            MATERIALS.filter(m => m.cat === key).forEach(mat => {
                const data = inventory[mat.id] || { qty: 0, loc: "" };
                const item = document.createElement('div');
                item.className = 'inv-item';
                item.innerHTML = `<span>${mat.name}</span><input type="number" value="${data.qty}" onchange="updateStock('${mat.id}', 'qty', this.value)"><input type="text" class="loc-input" value="${data.loc}" placeholder="LOC" onchange="updateStock('${mat.id}', 'loc', this.value)">`;
                content.appendChild(item);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function updateStock(id, field, val) {
        if (!inventory[id]) inventory[id] = { qty: 0, loc: "" };
        if (field === 'qty') inventory[id].qty = Math.max(0, parseInt(val) || 0);
        else inventory[id].loc = val.toUpperCase();
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        updateDisplay();
        syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        const lamp = document.getElementById('sync-lamp');
        try {
            const payload = { action: "sync", squadCode: squad, handle: handle, inventory: JSON.stringify(inventory), completed: JSON.stringify(completed) };
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            lamp.classList.add('active');
            document.getElementById('sync-text').innerText = "STATUS: CLOUD_SYNC_ACTIVE";
            setTimeout(() => lamp.classList.remove('active'), 1500);
        } catch (e) { document.getElementById('sync-text').innerText = "STATUS: SYNC_ERROR"; }
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        const searchTerm = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        let readyCount = 0;
        CONTRACTS.sort((a,b) => (tracked.includes(b.id) - tracked.includes(a.id)) || a.name.localeCompare(b.name)).forEach(c => {
            const isDone = completed.includes(c.id);
            const isPinned = tracked.includes(c.id);
            if (!c.name.toLowerCase().includes(searchTerm) && !c.reward.toLowerCase().includes(searchTerm)) return;
            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const data = inventory[ing.id] || { qty: 0, loc: "" };
                if (data.qty < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                return `<li class="${data.qty >= ing.qty ? 'status-ready' : 'status-missing'}">${data.qty}/${ing.qty} ${mat ? mat.name : ing.id} ${data.loc ? '<span class="loc-tag">['+data.loc+']</span>' : ''}</li>`;
            }).join('');
            if (canCraft && !isDone) readyCount++;
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft && !isDone) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft && !isDone ? 'craftable' : ''} ${isPinned ? 'pinned' : ''}`;
                card.innerHTML = `<div style="display:flex; justify-content:space-between;"><span style="font-size:9px; color:#555;">${c.cat}</span><button class="btn" style="border:none; color:${isPinned ? 'var(--t-orange)' : '#444'}" onclick="toggleTrack('${c.id}')">${isPinned ? '★' : '☆'}</button></div><b style="color:#fff;">${c.name}</b><br><small class="reward-text">REWARD: ${c.reward}</small><ul class="ingred-list">${ingreds}</ul><button class="btn" ${!canCraft ? 'disabled' : ''} onclick="execute('${c.id}')">${canCraft ? '[ HAND_IN ]' : '[ INCOMPLETE ]'}</button>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerText = `MANIFEST :: ${readyCount} READY`;
    }

    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); syncWithCloud(); }
    function toggleTrack(id) { const idx = tracked.indexOf(id); if(idx > -1) tracked.splice(idx, 1); else tracked.push(id); localStorage.setItem('wikelo-tracked', JSON.stringify(tracked)); updateDisplay(); }
    function setFilter(m) { filterMode = m; updateDisplay(); }
    function execute(id) { const c = CONTRACTS.find(x => x.id === id); c.ingredients.forEach(ing => { if(inventory[ing.id]) inventory[ing.id].qty -= ing.qty; }); completed.push(id); localStorage.setItem('wikelo-inventory', JSON.stringify(inventory)); localStorage.setItem('wikelo-completed', JSON.stringify(completed)); renderInventoryTabs(); updateDisplay(); syncWithCloud(); }
    function resetAll() { if(confirm("WIPE DATA?")) { localStorage.clear(); location.reload(); } }
    window.onload = init;
</script>
</body>
</html>
