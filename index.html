<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIKELO::LOGISTICS_SYNC v1.9.6</title>
    <style>
        :root { --t-orange: #FF8C00; --bg: #000; --card: #0a0a0a; --border: #333; --success: #00FF00; --error: #ef4444; }
        
        * { box-sizing: border-box; } 

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 420px; 
            border-right: 2px solid var(--t-orange); 
            padding: 20px; 
            overflow-y: auto; 
            background: #050505; 
            flex-shrink: 0; 
        }
        
        .sync-panel { 
            background: #111; 
            padding: 15px; 
            border: 1px solid var(--t-orange); 
            margin-bottom: 20px;
            width: 100%;
        }

        .sync-panel input.btn-input {
            width: 100%;
            display: block;
            margin-bottom: 10px;
            text-align: left;
            padding: 12px;
            background: #000;
            border: 1px solid var(--t-orange);
            color: var(--t-orange);
            font-family: monospace;
            font-size: 11px;
        }

        .sync-status { display: flex; align-items: center; font-size: 10px; margin-top: 10px; }
        .lamp { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: #333; transition: 0.3s; }
        .lamp.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        /* --- MAIN CONTENT & FIXED HEADER --- */
        .main-content { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            position: relative; 
            background: var(--bg);
        }

        .header-controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px;
            border-bottom: 2px solid var(--t-orange); 
            background: var(--bg); /* Solid black to block scrolling content */
            z-index: 100; 
            width: 100%;
            margin: 0; 
            flex-shrink: 0;
        }
        
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 15px; 
        }

        /* --- THE PIN STAR --- */
        .pin-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 24px; /* Big enough to see */
            line-height: 1;
            padding: 0;
            transition: transform 0.1s ease;
        }
        .pin-btn.active {
            color: var(--t-orange);
            text-shadow: 0 0 8px var(--t-orange);
        }
        .pin-btn.inactive {
            color: #222; /* Dim but visible */
        }
        .pin-btn:hover { transform: scale(1.2); }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 2px solid var(--t-orange); height: auto; }
            .main-content { height: auto; overflow: visible; }
            .header-controls { position: sticky; top: 0; padding: 15px; flex-direction: column; gap: 10px; align-items: flex-start; }
            .grid { grid-template-columns: 1fr; }
            .scroll-area { overflow: visible; padding: 10px; }
            .inv-item { grid-template-columns: 1fr 60px 80px; }
        }

        .tab-header { background: #111; border: 1px solid var(--border); color: var(--t-orange); padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; text-transform: uppercase; font-weight: bold; width: 100%; }
        .tab-content { display: none; padding: 5px; border: 1px solid #222; background: #080808; border-top: none; }
        .tab-content.open { display: block; }
        
        .inv-item { display: grid; grid-template-columns: 1fr 60px 100px; gap: 8px; align-items: center; padding: 10px 8px; border-bottom: 1px solid #111; }
        .inv-item span { font-size: 10px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-item input { background: #000; border: 1px solid var(--t-orange); color: var(--t-orange); text-align: center; font-size: 12px; outline: none; padding: 5px 0; width: 100%; }

        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; transition: 0.2s; position: relative; }
        .card.craftable { border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .card.pinned { border-left: 4px solid var(--t-orange); }
        
        .reward-text { color: #a855f7; font-size: 11px; display: block; margin: 5px 0; font-weight: bold; }
        .ingred-list { font-size: 11px; list-style: none; padding: 0; margin: 10px 0; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }
        
        .btn { background: transparent; border: 1px solid var(--t-orange); color: var(--t-orange); padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; font-family: monospace; min-height: 40px; }
        .btn:hover:not(:disabled) { background: rgba(255,140,0,0.1); }
        .active-filter { background: var(--t-orange) !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sync-panel">
        <h2 style="color:var(--t-orange); font-size:12px; margin:0 0 10px 0;">[ CLOUD_SYNC_LOGISTICS ]</h2>
        <input type="text" id="squad-code" class="btn-input" placeholder="SQUAD_CODE..." onchange="saveConfig()">
        <input type="text" id="user-handle" class="btn-input" placeholder="HANDLE..." onchange="saveConfig()">
        <div class="sync-status">
            <div id="sync-lamp" class="lamp"></div>
            <span id="sync-text">STATUS: CONNECTING...</span>
        </div>
    </div>
    <div id="inventory-tabs"></div>
    <button class="btn" style="width: 100%; margin-top: 20px; border-color: var(--error); color: var(--error);" onclick="resetAll()">[ WIPE_LOCAL_DATA ]</button>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header" style="margin:0; font-size: 16px;">WIKELO::MANIFEST</h1>
        <div style="display:flex; gap:5px; align-items:center; flex-wrap: wrap;">
            <input type="text" id="manifest-search" class="btn" style="width:140px; text-align:left;" placeholder="SEARCH..." oninput="updateDisplay()">
            <button class="btn" id="f-all" onclick="setFilter('all')">ALL</button>
            <button class="btn active-filter" id="f-craft" onclick="setFilter('craftable')">READY</button>
            <button class="btn" id="f-track" onclick="setFilter('tracked')">PINNED</button>
        </div>
    </div>
    <div class="scroll-area">
        <div id="contract-grid" class="grid"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIb6Ptkl9cSbwpwg79jnfXaFWVrcYu4FJB6P6hD1lMrZi_y2Zyp58WM5VxQchktMle5A/exec";
    
    let MATERIALS = [];
    let CONTRACTS = [];
    let inventory = {};
    let completed = [];
    let tracked = [];
    let filterMode = 'craftable';

    const CATEGORIES = {
        "currency": "Currency & Scrips",
        "ores": "Raw Materials",
        "creature": "Creature Materials",
        "medals": "Artifacts & Medals",
        "tech": "Tech & RCMBNTs",
        "weapons": "Weapons",
        "gear": "Gear & Vehicles"
    };

    async function loadSystemData() {
        try {
            const response = await fetch('wikelo-data.json');
            if (!response.ok) throw new Error("FETCH_FAILED");
            const data = await response.json();
            MATERIALS = data.materials || [];
            CONTRACTS = data.contracts || [];
            inventory = JSON.parse(localStorage.getItem('wikelo-inventory')) || {};
            completed = JSON.parse(localStorage.getItem('wikelo-completed')) || [];
            tracked = JSON.parse(localStorage.getItem('wikelo-tracked')) || [];
            document.getElementById('squad-code').value = localStorage.getItem('wikelo-squad') || "";
            document.getElementById('user-handle').value = localStorage.getItem('wikelo-handle') || "";
            renderInventoryTabs();
            updateDisplay();
            document.getElementById('sync-text').innerText = "STATUS: ONLINE";
            setInterval(syncWithCloud, 15000);
            syncWithCloud();
        } catch (e) {
            document.getElementById('sync-text').innerText = "STATUS: JSON_LOAD_ERROR";
        }
    }

    function renderInventoryTabs() {
        const container = document.getElementById('inventory-tabs');
        container.innerHTML = '';
        Object.entries(CATEGORIES).forEach(([key, label]) => {
            const mats = MATERIALS.filter(m => m.cat === key);
            if (mats.length === 0) return;
            const header = document.createElement('div');
            header.className = 'tab-header';
            header.innerHTML = `<span>${label}</span><span>[+]</span>`;
            header.onclick = () => {
                const content = header.nextElementSibling;
                content.classList.toggle('open');
                header.querySelector('span:last-child').innerText = content.classList.contains('open') ? '[-]' : '[+]';
            };
            const content = document.createElement('div');
            content.className = 'tab-content';
            mats.forEach(mat => {
                const data = inventory[mat.id] || { qty: 0, loc: "" };
                const item = document.createElement('div');
                item.className = 'inv-item';
                item.innerHTML = `<span>${mat.name}</span><input type="number" value="${data.qty}" onchange="updateStock('${mat.id}', 'qty', this.value)"><input type="text" style="color:#888; font-size:10px;" value="${data.loc || ''}" placeholder="LOC" onchange="updateStock('${mat.id}', 'loc', this.value)">`;
                content.appendChild(item);
            });
            container.appendChild(header);
            container.appendChild(content);
        });
    }

    function updateStock(id, field, val) {
        if (!inventory[id]) inventory[id] = { qty: 0, loc: "" };
        if (field === 'qty') inventory[id].qty = Math.max(0, parseInt(val) || 0);
        else inventory[id].loc = (val || "").toUpperCase();
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        updateDisplay();
        syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;
        const lamp = document.getElementById('sync-lamp');
        try {
            const payload = { action: "sync", squadCode: squad, handle: handle, inventory: JSON.stringify(inventory), completed: JSON.stringify(completed) };
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            lamp.classList.add('active');
            setTimeout(() => lamp.classList.remove('active'), 1500);
        } catch (e) { }
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        const searchTerm = document.getElementById('manifest-search').value.toLowerCase();
        grid.innerHTML = '';
        let readyCount = 0;
        const sorted = [...CONTRACTS].sort((a,b) => (tracked.includes(b.id) - tracked.includes(a.id)) || a.name.localeCompare(b.name));
        sorted.forEach(c => {
            const isDone = completed.includes(c.id);
            const isPinned = tracked.includes(c.id);
            if (!c.name.toLowerCase().includes(searchTerm) && !c.reward.toLowerCase().includes(searchTerm)) return;
            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const data = inventory[ing.id] || { qty: 0, loc: "" };
                const qtyReq = ing.qty || 0;
                if (data.qty < qtyReq) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                return `<li class="${data.qty >= qtyReq ? 'status-ready' : 'status-missing'}">${data.qty}/${qtyReq} ${mat ? mat.name : ing.id} ${data.loc ? '<span style="color:#666; font-size:9px;">['+data.loc+']</span>' : ''}</li>`;
            }).join('');
            if (canCraft && !isDone) readyCount++;
            if (filterMode === 'all' || (filterMode === 'craftable' && canCraft && !isDone) || (filterMode === 'tracked' && isPinned)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft && !isDone ? 'craftable' : ''} ${isPinned ? 'pinned' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items: flex-start;">
                        <span style="font-size:9px; color:#555;">${c.cat}</span>
                        <button class="pin-btn ${isPinned ? 'active' : 'inactive'}" onclick="toggleTrack('${c.id}')">
                            ★
                        </button>
                    </div>
                    <b style="color:#fff; display:block; margin-top: -10px;">${c.name}</b>
                    <small class="reward-text">REWARD: ${c.reward}</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" ${!canCraft ? 'disabled' : ''} onclick="execute('${c.id}')">${canCraft ? '[ HAND_IN ]' : '[ INCOMPLETE ]'}</button>`;
                grid.appendChild(card);
            }
        });
        document.getElementById('stats-header').innerText = `MANIFEST :: ${readyCount} READY`;
    }

    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); syncWithCloud(); }
    function toggleTrack(id) { 
        const idx = tracked.indexOf(id); 
        if(idx > -1) tracked.splice(idx, 1); 
        else tracked.push(id); 
        localStorage.setItem('wikelo-tracked', JSON.stringify(tracked)); 
        updateDisplay(); 
    }
    function setFilter(m) { 
        filterMode = m; 
        document.querySelectorAll('.header-controls .btn').forEach(b => b.classList.remove('active-filter'));
        if(m === 'all') document.getElementById('f-all').classList.add('active-filter');
        if(m === 'craftable') document.getElementById('f-craft').classList.add('active-filter');
        if(m === 'tracked') document.getElementById('f-track').classList.add('active-filter');
        updateDisplay(); 
    }
    function execute(id) { 
        const c = CONTRACTS.find(x => x.id === id); 
        c.ingredients.forEach(ing => { if(inventory[ing.id]) inventory[ing.id].qty -= ing.qty; }); 
        completed.push(id); 
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory)); 
        localStorage.setItem('wikelo-completed', JSON.stringify(completed)); 
        renderInventoryTabs(); updateDisplay(); syncWithCloud(); 
    }
    function resetAll() { if(confirm("WIPE DATA?")) { localStorage.clear(); location.reload(); } }
    window.onload = loadSystemData;
</script>
</body>
</html>
