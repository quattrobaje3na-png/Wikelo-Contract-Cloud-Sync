<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIKELO::CONTRACT_TRACKER v1.0</title>
    <style>
        :root {
            --t-orange: #FF8C00; --bg: #000; --card: #0a0a0a;
            --border: #333; --success: #00FF00; --error: #ef4444;
        }
        body {
            background: var(--bg); color: #fff; font-family: 'Courier New', monospace;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }
        /* --- SIDEBAR: STOCK LEDGER --- */
        .sidebar {
            width: 320px; border-right: 2px solid var(--t-orange);
            padding: 20px; overflow-y: auto; background: #050505;
        }
        .inv-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; background: var(--card); padding: 8px; border: 1px solid var(--border);
        }
        .inv-item input {
            width: 60px; background: #000; border: 1px solid var(--t-orange);
            color: var(--t-orange); text-align: center; font-family: monospace;
        }
        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .header-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid var(--t-orange); padding-bottom: 15px;
        }
        .filter-group { display: flex; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        /* --- CONTRACT CARDS --- */
        .card {
            background: var(--card); border: 1px solid var(--border); padding: 15px;
            position: relative; transition: 0.2s;
        }
        .card.craftable { border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .card.completed { opacity: 0.5; border-style: dashed; }
        .reward-text { color: #a855f7; font-size: 12px; display: block; margin: 5px 0; }
        .ingred-list { font-size: 11px; list-style: none; padding: 0; margin: 10px 0; }
        .ingred-list li { margin-bottom: 4px; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }
        /* --- BUTTONS --- */
        .btn {
            background: transparent; border: 1px solid var(--t-orange); color: var(--t-orange);
            padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold;
        }
        .btn:hover:not(:disabled) { background: rgba(255,140,0,0.1); }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        .btn-success { border-color: var(--success); color: var(--success); }
        .active-filter { background: var(--t-orange) !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--t-orange); font-size: 14px;">[ STOCK_LEDGER ]</h2>
    <div id="inventory-list"></div>
    <button class="btn" style="width: 100%; margin-top: 20px;" onclick="resetAll()">[ WIPE_ALL_DATA ]</button>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header">WIKELO::MANIFEST</h1>
        <div class="filter-group">
            <button class="btn" id="f-all" onclick="setFilter('all')">ALL</button>
            <button class="btn active-filter" id="f-craft" onclick="setFilter('craftable')">READY</button>
        </div>
    </div>
    <div id="contract-grid" class="grid"></div>
</div>

<script>
    // Data structures extracted from provided source
    const MATERIALS = [
        {id: "wikelo-favor", name: "Wikelo Favor"},
        {id: "mg-scrip", name: "MG Scrip"},
        {id: "carinite-pure", name: "Carinite (Pure)"},
        {id: "valakkar-pearl-aaa", name: "Valakkar Pearl (AAA)"},
        {id: "asd-secure-drive", name: "ASD Secure Drive"}
    ];

    const CONTRACTS = [
        {id: "ana-endro", name: "Armor with horn and string", reward: "Ana Armor Endro Set", ingredients: [{id:"carinite-pure", qty:1}, {id:"wikelo-favor", qty:5}]},
        {id: "bokto-armor", name: "Make glowy armor", reward: "Bokto Armor Set", ingredients: [{id:"valakkar-pearl-aaa", qty:1}, {id:"wikelo-favor", qty:5}]},
        {id: "geist-snow", name: "Hide Snow Suit", reward: "Geist Snow Camo Set", ingredients: [{id:"asd-secure-drive", qty:4}, {id:"wikelo-favor", qty:2}]}
    ];

    // State Persistence
    let inventory = JSON.parse(localStorage.getItem('wikelo-inventory')) || {};
    let completed = JSON.parse(localStorage.getItem('wikelo-completed')) || [];
    let filterMode = 'craftable';

    function init() {
        renderInventory();
        updateDisplay();
    }

    function renderInventory() {
        const container = document.getElementById('inventory-list');
        container.innerHTML = '';
        MATERIALS.forEach(mat => {
            const val = inventory[mat.id] || 0;
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.innerHTML = `
                <span>${mat.name}</span>
                <input type="number" value="${val}" min="0" onchange="updateStock('${mat.id}', this.value)">
            `;
            container.appendChild(div);
        });
    }

    function updateStock(id, val) {
        inventory[id] = Math.max(0, parseInt(val) || 0);
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        updateDisplay();
    }

    function setFilter(mode) {
        filterMode = mode;
        document.getElementById('f-all').classList.toggle('active-filter', mode === 'all');
        document.getElementById('f-craft').classList.toggle('active-filter', mode === 'craftable');
        updateDisplay();
    }

    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        grid.innerHTML = '';
        let craftableCount = 0;

        CONTRACTS.forEach(contract => {
            const isDone = completed.includes(contract.id);
            let canCraft = true;
            let ingredHTML = '';

            contract.ingredients.forEach(ing => {
                const owned = inventory[ing.id] || 0;
                const missing = owned < ing.qty;
                if (missing) canCraft = false;
                
                const matName = MATERIALS.find(m => m.id === ing.id).name;
                ingredHTML += `<li class="${missing ? 'status-missing' : 'status-ready'}">
                    ${owned}/${ing.qty} ${matName}
                </li>`;
            });

            if (canCraft && !isDone) craftableCount++;

            // Filter logic
            if (filterMode === 'all' || (canCraft && !isDone)) {
                const card = document.createElement('div');
                card.className = `card ${canCraft && !isDone ? 'craftable' : ''} ${isDone ? 'completed' : ''}`;
                card.innerHTML = `
                    <div style="font-weight: bold; font-size: 14px;">${contract.name}</div>
                    <span class="reward-text">REWARD: ${contract.reward}</span>
                    <ul class="ingred-list">${ingredHTML}</ul>
                    ${isDone ? '<button class="btn" disabled>[ COMPLETED ]</button>' : 
                    `<button class="btn ${canCraft ? 'btn-success' : ''}" ${!canCraft ? 'disabled' : ''} 
                        onclick="executeContract('${contract.id}')">
                        ${canCraft ? '[ HAND_IN_CONTRACT ]' : '[ INSUFFICIENT_STOCK ]'}
                    </button>`}
                `;
                grid.appendChild(card);
            }
        });

        document.getElementById('stats-header').innerText = `MANIFEST :: ${craftableCount} READY`;
    }

    function executeContract(id) {
        const contract = CONTRACTS.find(c => c.id === id);
        if (!contract || !confirm(`CONFIRM HAND-IN: ${contract.name}?`)) return;

        // Deduct items
        contract.ingredients.forEach(ing => {
            inventory[ing.id] -= ing.qty;
        });

        completed.push(id);
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        localStorage.setItem('wikelo-completed', JSON.stringify(completed));
        
        renderInventory();
        updateDisplay();
    }

    function resetAll() {
        if (confirm("ERASE ALL SAVED DATA?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
