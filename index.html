<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIKELO::XP_SQUAD_LOGISTICS v1.9</title>
    <style>
        :root { --t-orange: #FF8C00; --bg: #000; --card: #0a0a0a; --border: #333; --success: #00FF00; --error: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- SIDEBAR --- */
        .sidebar { width: 420px; border-right: 2px solid var(--t-orange); padding: 20px; overflow-y: auto; background: #050505; }
        .xp-display { background: #111; border: 1px solid var(--t-orange); padding: 15px; margin-bottom: 20px; text-align: center; }
        .xp-val { font-size: 24px; color: var(--t-orange); text-shadow: 0 0 10px var(--t-orange); }
        
        .sync-panel { background: #0a0a0a; padding: 10px; border: 1px solid #222; margin-bottom: 20px; font-size: 10px; }
        .lamp { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #333; margin-right: 5px; }
        .lamp.active { background: var(--success); box-shadow: 0 0 8px var(--success); }

        .tab-header { background: #111; border: 1px solid var(--border); color: var(--t-orange); padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; font-weight: bold; }
        .tab-content { display: none; padding: 5px; border: 1px solid #222; background: #080808; border-top: none; }
        .tab-content.open { display: block; }
        .inv-item { display: grid; grid-template-columns: 1fr 50px 100px; gap: 8px; align-items: center; padding: 6px 8px; border-bottom: 1px solid #111; }
        .inv-item input { background: #000; border: 1px solid var(--t-orange); color: var(--t-orange); text-align: center; font-size: 11px; outline: none; }

        /* --- MODAL FOR USER CONFIRMATION --- */
        #user-modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; border: 2px solid var(--t-orange); width: 300px; margin: 15% auto; padding: 20px; text-align: center; }
        .user-option { display: block; padding: 10px; border: 1px solid #333; margin: 5px 0; cursor: pointer; }
        .user-option:hover { border-color: var(--t-orange); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--t-orange); padding-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; position: relative; }
        .card.craftable { border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .reward-text { color: #a855f7; font-size: 11px; display: block; margin: 5px 0; }
        .ingred-list { font-size: 11px; list-style: none; padding: 0; margin: 10px 0; }
        .status-ready { color: var(--success); }
        .status-missing { color: var(--error); }
        .btn { background: transparent; border: 1px solid var(--t-orange); color: var(--t-orange); padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

<div id="user-modal">
    <div class="modal-content">
        <h3 style="color:var(--t-orange)">CONFIRM_SQUAD_USERS</h3>
        <p style="font-size:10px;">Who contributed to this contract?</p>
        <div id="user-list-target"></div>
        <button class="btn" onclick="closeModal()">CANCEL</button>
    </div>
</div>

<div class="sidebar">
    <div class="xp-display">
        <div style="font-size: 10px; letter-spacing: 2px;">TOTAL_REPUTATION_XP</div>
        <div id="total-xp" class="xp-val">0</div>
    </div>
    <div class="sync-panel">
        <input type="text" id="squad-code" class="btn" style="width:100%; text-align:left; margin-bottom:5px;" placeholder="SQUAD_CODE..." onchange="saveConfig()">
        <input type="text" id="user-handle" class="btn" style="width:100%; text-align:left;" placeholder="MY_HANDLE..." onchange="saveConfig()">
        <div class="sync-status">
            <div id="sync-lamp" class="lamp"></div> <span id="sync-text">STATUS: LOCAL</span>
        </div>
    </div>
    <div id="inventory-tabs"></div>
    <button class="btn" style="width: 100%; margin-top: 20px; border-color: var(--error); color: var(--error);" onclick="resetAll()">[ WIPE_DATA ]</button>
</div>

<div class="main-content">
    <div class="header-controls">
        <h1 id="stats-header">MANIFEST</h1>
        <div style="display:flex; gap:8px;">
            <input type="text" id="manifest-search" class="btn" style="width:180px; text-align:left;" placeholder="SEARCH..." oninput="updateDisplay()">
            <button class="btn" onclick="setFilter('craftable')">READY</button>
            <button class="btn" onclick="setFilter('all')">ALL</button>
        </div>
    </div>
    <div id="contract-grid" class="grid"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywgKsYfx5yZP2cgLDlfsKia5hEcbS5LrJ6v4SQtdzRF4CyBGPYtfz_gnTiNbO3gaCxUA/exec";
    let MATERIALS = [], CONTRACTS = [];
    let inventory = JSON.parse(localStorage.getItem('wikelo-inventory')) || {};
    let completed = JSON.parse(localStorage.getItem('wikelo-completed')) || [];
    let totalXP = parseInt(localStorage.getItem('wikelo-xp')) || 0;
    let squadMembers = []; // Live handles from Sheet
    let filterMode = 'craftable';
    let activeContractId = null;

    async function loadSystemData() {
        const response = await fetch('wikelo-data.json');
        const data = await response.json();
        MATERIALS = data.materials;
        CONTRACTS = data.contracts;
        document.getElementById('total-xp').innerText = totalXP;
        renderInventoryTabs();
        updateDisplay();
        setInterval(syncWithCloud, 15000);
        syncWithCloud();
    }

    async function syncWithCloud() {
        const squad = document.getElementById('squad-code').value;
        const handle = document.getElementById('user-handle').value;
        if (!squad || !handle) return;

        try {
            const payload = { action: "sync", squadCode: squad, handle: handle, inventory: JSON.stringify(inventory), completed: JSON.stringify(completed), xp: totalXP };
            const resp = await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            // In a real no-cors fetch, we can't read response, so we'd need a separate GET to refresh squadMembers
            document.getElementById('sync-lamp').classList.add('active');
            setTimeout(() => document.getElementById('sync-lamp').classList.remove('active'), 1500);
        } catch (e) { console.error(e); }
    }

    function openExecuteModal(id) {
        activeContractId = id;
        const target = document.getElementById('user-list-target');
        target.innerHTML = '';
        
        // Mocking squad members for this build; normally pulled from Sheet metadata
        const members = [document.getElementById('user-handle').value, "SQUAD_MEMBER_1", "SQUAD_MEMBER_2"]; 
        
        members.forEach(m => {
            const div = document.createElement('div');
            div.className = 'user-option';
            div.innerText = m;
            div.onclick = () => finalizeContract(m);
            target.appendChild(div);
        });
        document.getElementById('user-modal').style.display = 'block';
    }

    function finalizeContract(selectedUser) {
        const c = CONTRACTS.find(x => x.id === activeContractId);
        if(!c) return;

        // Deduct materials
        c.ingredients.forEach(ing => inventory[ing.id].qty -= ing.qty);
        
        // Update XP
        const earned = c.reputationReward || 0;
        totalXP += earned;
        
        completed.push({ id: c.id, user: selectedUser, date: new Date().toISOString() });
        
        localStorage.setItem('wikelo-inventory', JSON.stringify(inventory));
        localStorage.setItem('wikelo-completed', JSON.stringify(completed));
        localStorage.setItem('wikelo-xp', totalXP);
        
        document.getElementById('total-xp').innerText = totalXP;
        closeModal();
        renderInventoryTabs();
        updateDisplay();
        syncWithCloud();
        alert(`SUCCESS: ${earned} XP assigned to ${selectedUser}`);
    }

    function closeModal() { document.getElementById('user-modal').style.display = 'none'; }
    function renderInventoryTabs() { /* Logic same as v1.8 */ }
    function updateStock(id, field, val) { /* Logic same as v1.8 */ }
    
    function updateDisplay() {
        const grid = document.getElementById('contract-grid');
        grid.innerHTML = '';
        CONTRACTS.forEach(c => {
            const data = inventory[c.id] || {};
            let canCraft = true;
            const ingreds = c.ingredients.map(ing => {
                const stock = inventory[ing.id] || {qty:0, loc:""};
                if(stock.qty < ing.qty) canCraft = false;
                const mat = MATERIALS.find(m => m.id === ing.id);
                return `<li class="${stock.qty >= ing.qty ? 'status-ready' : 'status-missing'}">${stock.qty}/${ing.qty} ${mat?mat.name:ing.id}</li>`;
            }).join('');

            const show = (filterMode === 'all') || (canCraft && filterMode === 'craftable');
            if(show) {
                const card = document.createElement('div');
                card.className = `card ${canCraft ? 'craftable' : ''}`;
                card.innerHTML = `
                    <b>${c.name}</b><br>
                    <small class="reward-text">REWARD: ${c.reward} (+${c.reputationReward || 0} XP)</small>
                    <ul class="ingred-list">${ingreds}</ul>
                    <button class="btn" ${!canCraft ? 'disabled' : ''} onclick="openExecuteModal('${c.id}')">
                        ${canCraft ? '[ HAND_IN_CONTRACT ]' : '[ INSUFFICIENT_STOCK ]'}
                    </button>`;
                grid.appendChild(card);
            }
        });
    }

    function saveConfig() { localStorage.setItem('wikelo-squad', document.getElementById('squad-code').value); localStorage.setItem('wikelo-handle', document.getElementById('user-handle').value); }
    function setFilter(m) { filterMode = m; updateDisplay(); }
    window.onload = loadSystemData;
</script>
</body>
</html>
